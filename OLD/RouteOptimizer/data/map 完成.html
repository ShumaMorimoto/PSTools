<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Map Point Selector</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- ExtraMarkers -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/leaflet-extra-markers@1.2.2/dist/css/leaflet.extra-markers.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/leaflet-extra-markers@1.2.2/dist/js/leaflet.extra-markers.min.js"></script>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"
    />

    <!-- Leaflet Geocoder -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"
    />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
      }
      #controls {
        padding: 6px 8px;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      #pointList, button {
        font-size: 1rem;
        height: 1.6em;
        line-height: 1.6em;
        padding: 0 4px;
        box-sizing: border-box;
      }
      #pointList {
        flex: 1;
      }
      button {
        width: 80px;
      }
      #map {
        flex: 1;
      }
    </style>
  </head>

  <body>
    <div id="controls">
      <select id="pointList"></select>
      <button onclick="clearMarkers()">Clear</button>
      <button onclick="finish()">Finish</button>
    </div>

    <div id="map"></div>

    <script>
      // ------- 初期化 -------
      var map = L.map("map").setView([$CenterLat, $CenterLng], $Zoom);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap contributors",
      }).addTo(map);

      // 検索
      L.Control.geocoder({
        defaultMarkGeocode: false,
      })
        .on("markgeocode", function (e) {
          map.setView(e.geocode.center, map.getZoom());
        })
        .addTo(map);

      var markers = [];
      var pointList = [];
      var selectedIndex = null;

      // ✅ Nominatim で POI 名を取得
      async function reverseGeocode(lat, lon) {
        const url =
          "https://nominatim.openstreetmap.org/reverse?format=json" +
          "&lat=" + lat +
          "&lon=" + lon +
          "&zoom=18&addressdetails=1&extratags=1&namedetails=1";

        const res = await fetch(url, {
          headers: {
            "User-Agent": "MapPointSelector/1.0"
          }
        });

        const data = await res.json();

        // ✅ 1. POI 名（最優先）
        if (data.namedetails && data.namedetails.name) {
          return data.namedetails.name;
        }
        if (data.name) {
          return data.name;
        }

        // ✅ 2. 住所 fallback
        if (data.address) {
          return Object.values(data.address).join("");
        }

        return "";
      }

      // ✅ ExtraMarkers で番号と色を更新
      function renumberMarkers() {
        markers.forEach(function (m, idx) {
          var icon = L.ExtraMarkers.icon({
            icon: "fa-number",
            number: idx + 1,
            markerColor: idx === selectedIndex ? "red" : "blue",
            shape: "circle",
          });
          m.setIcon(icon);
        });
      }

      // ------- 地図クリックで追加 -------
      map.on("click", async function (e) {
        var coord = { lat: e.latlng.lat, lon: e.latlng.lng };

        // ✅ POI 名取得
        coord.addr = await reverseGeocode(coord.lat, coord.lon);

        pointList.push(coord);

        var icon = L.ExtraMarkers.icon({
          icon: "fa-number",
          number: pointList.length,
          markerColor: "blue",
          shape: "circle",
        });

        var m = L.marker([coord.lat, coord.lon], {
          draggable: true,
          icon: icon,
        }).addTo(map);

        markers.push(m);

        // ✅ 追加したポイントを選択状態にする
        selectedIndex = pointList.length - 1;
        document.getElementById("pointList").value = selectedIndex;

        // ✅ 左クリックで選択
        m.on("click", function (ev) {
          L.DomEvent.stopPropagation(ev);
          var idx = markers.indexOf(m);
          if (idx >= 0) {
            selectedIndex = idx;
            document.getElementById("pointList").value = idx;
            renumberMarkers();
          }
        });

        // ✅ 右クリックで削除
        m.on("contextmenu", function () {
          var idx = markers.indexOf(m);
          if (idx >= 0) {
            map.removeLayer(markers[idx]);
            markers.splice(idx, 1);
            pointList.splice(idx, 1);

            if (selectedIndex === idx) {
              selectedIndex = null;
            } else if (selectedIndex > idx) {
              selectedIndex -= 1;
            }

            updatePointList();
            renumberMarkers();
          }
        });

        // ドラッグ後に座標更新＋POI 再取得
        m.on("dragend", function () {
          var idx = markers.indexOf(m);
          if (idx >= 0) {
            var pos = m.getLatLng();
            pointList[idx].lat = pos.lat;
            pointList[idx].lon = pos.lng;

            reverseGeocode(pos.lat, pos.lng).then((addr) => {
              pointList[idx].addr = addr;
              updatePointList();
            });
          }
        });

        updatePointList();
        renumberMarkers();

        fetch("/click", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(coord),
        });
      });

      // ------- リスト更新 -------
      function updatePointList() {
        var list = document.getElementById("pointList");
        list.innerHTML = "";
        pointList.forEach(function (p, idx) {
          var opt = document.createElement("option");
          opt.value = idx;

          // ✅ POI 名があればそれを表示
          opt.textContent =
            (idx + 1) + ": " + (p.addr ? p.addr : (p.lat.toFixed(6) + ", " + p.lon.toFixed(6)));

          list.appendChild(opt);
        });

        if (selectedIndex !== null && selectedIndex < pointList.length) {
          list.value = selectedIndex;
        }
      }

      // ------- リスト選択でジャンプ（ズームなし）-------
      document.getElementById("pointList").onchange = function () {
        var idx = this.value;
        if (idx === "" || idx == null) return;
        idx = Number(idx);
        selectedIndex = idx;

        var p = pointList[idx];
        map.setView([p.lat, p.lon], map.getZoom());

        renumberMarkers();
      };

      // ------- Clear -------
      function clearMarkers() {
        markers.forEach((m) => map.removeLayer(m));
        markers = [];
        pointList = [];
        selectedIndex = null;
        updatePointList();
        renumberMarkers();
      }

      // ------- Finish -------
      function finish() {
        fetch("/done", { method: "POST" }).then(function () {
          alert("Finish requested. You can close this window.");
        });
      }

      // ------- 終了時 -------
      window.addEventListener("beforeunload", function () {
        navigator.sendBeacon("/done");
      });
    </script>
  </body>
</html>
