<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>汎用 API Sample</title>

    <script type="module">
      import { callApi, pollApi, initialize } from "/runapp/lib/js/api.js";

      // -----------------------------
      // ページロード時に初期データを反映
      // -----------------------------
      window.addEventListener("load", async () => {
        const initData = await initialize();
        if (initData) {
          document.getElementById("input").value = JSON.stringify(
            initData,
            null,
            2
          );
        }
      });

      // -----------------------------
      // API 操作
      // -----------------------------
      let stopPolling = null;

      async function onStart() {
        const input = document.getElementById("input").value;
        let data = null;

        try {
          data = JSON.parse(input);
        } catch {
          alert("JSON が不正です");
          return;
        }

        const res = await callApi("Start", data);
        console.log("Start:", res);

        if (stopPolling) stopPolling();
        stopPolling = pollApi("Status", 1000, (st) => {
          document.getElementById("status").textContent = JSON.stringify(
            st,
            null,
            2
          );
        });
      }

      async function onStop() {
        const res = await callApi("Stop");
        console.log("Stop:", res);
        if (stopPolling) stopPolling();
      }

      async function onGetBest() {
        const res = await callApi("GetBest");
        document.getElementById("best").textContent = JSON.stringify(
          res,
          null,
          2
        );
      }

      // -----------------------------
      // Optimize API
      // -----------------------------
      async function onOptimize() {
        const input = document.getElementById("input").value;
        let data = null;

        try {
          data = JSON.parse(input);
        } catch {
          alert("JSON が不正です");
          return;
        }

        const res = await callApi("Optimize", data);
        console.log("Optimize:", res);

        document.getElementById("best").textContent = JSON.stringify(
          res,
          null,
          2
        );
      }

      window.onStart = onStart;
      window.onStop = onStop;
      window.onGetBest = onGetBest;
      window.onOptimize = onOptimize;

      // --- ブラウザ終了時に /shutdown を確実に送る ---
      window.addEventListener("beforeunload", () => {
        navigator.sendBeacon("/shutdown", JSON.stringify({}));
      });
    </script>

    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
      }
      textarea {
        width: 100%;
        height: 120px;
      }
      pre {
        background: #eee;
        padding: 10px;
      }
    </style>
  </head>

  <body>
    <h1>汎用 API Sample</h1>

    <h2>入力データ(JSON)</h2>
    <textarea id="input">{}</textarea>

    <button onclick="onStart()">Start</button>
    <button onclick="onStop()">Stop</button>
    <button onclick="onGetBest()">GetBest</button>
    <button onclick="onOptimize()">Optimize</button>

    <h2>Status</h2>
    <pre id="status">{}</pre>

    <h2>Best</h2>
    <pre id="best">{}</pre>
  </body>
</html>
