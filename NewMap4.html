<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Selector + 画像重ね合わせツール（修正版）</title>

<!-- Leaflet 本体（必ず最初） -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- leaflet-toolbar（distortableimage の依存） -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-toolbar@0.4.0-alpha.2/dist/leaflet.toolbar.css" />
<script src="https://unpkg.com/leaflet-toolbar@0.4.0-alpha.2/dist/leaflet.toolbar.js"></script>

<!-- leaflet-distortableimage（toolbar の後に読み込む） -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-distortableimage@latest/dist/leaflet.distortableimage.css" />
<script src="https://unpkg.com/leaflet-distortableimage@latest/dist/leaflet.distortableimage.js"></script>

<!-- ExtraMarkers (マーカー装飾) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-extra-markers@1.2.2/dist/css/leaflet.extra-markers.min.css" />
<script src="https://cdn.jsdelivr.net/npm/leaflet-extra-markers@1.2.2/dist/js/leaflet.extra-markers.min.js"></script>

<!-- Geocoder -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<!-- FontAwesome (アイコン) -->
<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />

<style>
    html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        font-family: sans-serif;
    }

    /* 上部操作パネル */
    #controls {
        padding: 8px;
        background: #f0f0f0;
        border-bottom: 1px solid #ccc;
        display: flex;
        gap: 10px;
        height: 56px;
        box-sizing: border-box;
        align-items: center;
        z-index: 1000;
    }

    /* マップエリア */
    #map {
        flex: 1;
        width: 100%;
        background-color: #ddd;
        cursor: crosshair;
    }

    /* UIパーツ */
    #pointList { flex: 1; padding: 5px; height: 34px; }
    button, label.btn { padding: 6px 12px; cursor: pointer; border: none; background: #007bff; color: #fff; border-radius: 4px; display: inline-flex; align-items: center; gap: 6px; }
    button:hover, label.btn:hover { background: #0056b3; }
    button.locked { background: #dc3545; }
    button.locked:hover { background: #c82333; }

    input[type="file"] { display: none; }

    #info-box { font-family: monospace; font-size: 13px; background: white; padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; }

    /* ロックモード時の画像透過（地図クリックを優先） */
    .map-locked .leaflet-distortable-image-overlay,
    .map-locked img.leaflet-image-layer {
        pointer-events: none !important;
        cursor: crosshair !important;
        opacity: 0.85 !important;
        z-index: 200 !important;
    }
</style>
</head>
<body>

<div id="controls">
    <!-- 画像追加 -->
    <label for="imageInput" class="btn"><i class="fas fa-upload"></i> 画像を追加</label>
    <input type="file" id="imageInput" accept="image/*">

    <!-- 位置調整 / 確定切替 -->
    <button id="toggleLockBtn" class="btn" onclick="toggleLockMode()">
        <i class="fas fa-lock-open"></i> <span>位置調整モード</span>
    </button>

    <!-- ポイントリスト / 操作 -->
    <select id="pointList"><option>読み込み中...</option></select>
    <button onclick="clearMarkers()">クリア</button>
    <button onclick="finish()" id="finishBtn">登録</button>

    <div id="info-box">座標: <span id="coords">マップをクリックしてください</span></div>
</div>

<div id="map"></div>

<script>
/* =========================================================
   最小差分修正版スクリプト（既存ロジックを維持）
   ========================================================= */

const initialPoints = [
    { lat: 35.6812, lon: 139.7671, name: "東京駅(テスト)", desc: "初期データ" }
];
const initialLat = 35.6895;
const initialLng = 139.6917;
const initialZoom = 12;

let map;
let markers = [];
let pointList = [];
let selectedIndex = null;
let requestSeq = 0;

let imgGroup;      // L.distortableCollection()
let isLocked = false;

document.addEventListener("DOMContentLoaded", function () {
    map = L.map("map").setView([initialLat, initialLng], initialZoom);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap contributors",
        maxZoom: 19
    }).addTo(map);

    // Geocoder（住所検索）
    if (L.Control && L.Control.geocoder) {
        L.Control.geocoder({ defaultMarkGeocode: false })
            .on("markgeocode", function(e) { map.setView(e.geocode.center, 16); })
            .addTo(map);
    }

    // distortableCollection を作成（重要: FeatureGroup ではない）
    try {
        if (typeof L.distortableCollection === 'function') {
            imgGroup = L.distortableCollection().addTo(map);
        } else {
            console.warn('L.distortableCollection is not available.');
            imgGroup = { eachLayer: function(){}, addLayer: function(){}, removeLayer: function(){} };
        }
    } catch (e) {
        console.warn('distortableCollection init failed', e);
        imgGroup = { eachLayer: function(){}, addLayer: function(){}, removeLayer: function(){} };
    }

    if (Array.isArray(initialPoints)) {
        initialPoints.forEach(p => addPoint(p));
    }

    map.on("click", function (e) {
        const lat = e.latlng.lat.toFixed(6);
        const lng = e.latlng.lng.toFixed(6);
        document.getElementById('coords').innerText = `${lat}, ${lng}`;

        const info = { lat: e.latlng.lat, lon: e.latlng.lng, name: "", desc: "", extended: {} };
        addPoint(info);

        const newMarker = markers[markers.length - 1];
        fetchAddressAsync(info, newMarker);
    });

    document.getElementById('imageInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) { addImageToMap(event.target.result); e.target.value = ''; };
        reader.readAsDataURL(file);
    });

    const mapArea = document.getElementById('map');
    mapArea.addEventListener('dragover', (e) => { e.preventDefault(); });
    mapArea.addEventListener('drop', (e) => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = function(event) { addImageToMap(event.target.result); };
            reader.readAsDataURL(file);
        }
    });

    updateListUI();
});

/* 画像追加 */
function addImageToMap(url) {
    if (isLocked) {
        alert("画像を編集するには「確定済」を解除して「位置調整モード」にしてください。");
        return;
    }

    const bounds = map.getBounds();
    const center = bounds.getCenter();

    const height = (bounds.getNorth() - bounds.getSouth()) * 0.7;
    const width = (bounds.getEast() - bounds.getWest()) * 0.7;

    const north = center.lat + height / 2;
    const south = center.lat - height / 2;
    const west = center.lng - width / 2;
    const east = center.lng + width / 2;

    const initialCorners = [
        L.latLng(north, west), L.latLng(north, east),
        L.latLng(south, west), L.latLng(south, east)
    ];

    try {
        const img = L.distortableImageOverlay(url, {
            actions: [L.RotateAction, L.ScaleAction, L.FreeRotateAction, L.LockAction, L.OpacityAction, L.DeleteAction],
            corners: initialCorners,
            selected: true
        });

        img.on('delete', function() {
            try { imgGroup.removeLayer(img); } catch (e) { console.warn('removeLayer failed', e); }
        });

        imgGroup.addLayer(img);
    } catch (e) {
        console.error('addImageToMap error', e);
        alert('画像追加に失敗しました（コンソールを確認してください）。');
    }
}

/* ロック切替 */
function toggleLockMode() {
    isLocked = !isLocked;
    const btn = document.getElementById('toggleLockBtn');
    const mapDiv = document.getElementById('map');

    if (isLocked) {
        btn.innerHTML = '<i class="fas fa-lock"></i> <span>確定済 (クリックで座標取得)</span>';
        btn.classList.add('locked');
        mapDiv.classList.add('map-locked');

        try {
            imgGroup.eachLayer(function(layer) {
                try {
                    if (layer.editing && typeof layer.editing.disable === 'function') layer.editing.disable();
                    if (typeof layer.deselect === 'function') layer.deselect();
                } catch (err) { console.warn('layer disable/deselect failed', err); }
            });
        } catch (e) { /* ignore */ }
    } else {
        btn.innerHTML = '<i class="fas fa-lock-open"></i> <span>位置調整モード</span>';
        btn.classList.remove('locked');
        mapDiv.classList.remove('map-locked');

        try {
            imgGroup.eachLayer(function(layer) {
                try {
                    if (layer.editing && typeof layer.editing.enable === 'function') layer.editing.enable();
                } catch (err) { console.warn('layer enable failed', err); }
            });
        } catch (e) { /* ignore */ }
    }
}

/* 既存の地点選択ロジック */
function addPoint(info) {
    pointList.push(info);
    const idx = pointList.length - 1;

    const icon = L.ExtraMarkers.icon({
        icon: "fa-number", number: pointList.length,
        markerColor: "blue", shape: "circle"
    });

    const m = L.marker([info.lat, info.lon], { draggable: true, icon: icon }).addTo(map);
    markers.push(m);

    m.on("click", (ev) => {
        L.DomEvent.stopPropagation(ev);
        selectMarker(idx);
    });

    m.on("contextmenu", () => {
        removeMarker(idx);
    });

    m.on("dragend", () => {
        const pos = m.getLatLng();
        pointList[idx].lat = pos.lat;
        pointList[idx].lon = pos.lng || pos.lon || pos.lng;
        updateListUI();
        fetchAddressAsync(pointList[idx], m);
    });

    updateListUI();
    renumberMarkers();
}

function selectMarker(index) {
    selectedIndex = index;
    document.getElementById("pointList").value = index;
    renumberMarkers();
}

function removeMarker(index) {
    if (markers[index]) map.removeLayer(markers[index]);
    markers.splice(index, 1);
    pointList.splice(index, 1);

    selectedIndex = null;
    updateListUI();
    renumberMarkers();
}

function clearMarkers() {
    markers.forEach(m => { if (m) map.removeLayer(m); });
    markers = [];
    pointList = [];
    selectedIndex = null;
    updateListUI();
}

function fetchAddressAsync(point, marker) {
    const seq = ++requestSeq;
    point._reqSeq = seq;

    const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${point.lat}&lon=${point.lon}&zoom=18&addressdetails=1`;

    fetch(url)
        .then(res => res.json())
        .then(data => {
            if (point._reqSeq !== seq) return;
            if (!markers.includes(marker)) return;

            point.name = data.name || "";
            point.desc = data.display_name || "";
            point.extended = data.address || {};

            try {
                marker.bindPopup(point.name || point.desc).openPopup();
            } catch (e) { /* ignore */ }
            updateListUI();
        })
        .catch(e => console.log("Address fetch error", e));
}

function renumberMarkers() {
    markers.forEach((m, i) => {
        const isSelected = (i === selectedIndex);
        const icon = L.ExtraMarkers.icon({
            icon: "fa-number", number: i + 1,
            markerColor: isSelected ? "red" : "blue",
            shape: "circle"
        });
        try { m.setIcon(icon); } catch (e) { /* ignore */ }
        try { m.setZIndexOffset(isSelected ? 1000 : 0); } catch (e) { /* ignore */ }
    });
}

function updateListUI() {
    const list = document.getElementById("pointList");
    list.innerHTML = "";

    if (pointList.length === 0) {
        const opt = document.createElement("option");
        opt.text = "(地点を選択してください)";
        list.appendChild(opt);
        return;
    }

    pointList.forEach((p, i) => {
        const label = p.name || p.desc || "取得中...";
        const opt = document.createElement("option");
        opt.value = i;
        opt.text = `${i+1}: ${label}`;
        list.appendChild(opt);
    });

    if (selectedIndex !== null) list.value = selectedIndex;
}

document.getElementById("pointList").onchange = function() {
    const val = this.value;
    if (val === "" || isNaN(val)) return;
    const idx = parseInt(val);

    selectedIndex = idx;
    const p = pointList[idx];
    map.setView([p.lat, p.lon], map.getZoom());
    renumberMarkers();
};

function finish() {
    const btn = document.getElementById('finishBtn');

    if (btn.dataset.state === "done") {
        window.close();
        return;
    }

    btn.textContent = "送信中...";
    btn.disabled = true;

    fetch("/choice", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(pointList)
    })
    .then(() => fetch("/done", { method: "POST" }))
    .then(() => {
        btn.textContent = "完了 (閉じる)";
        btn.disabled = false;
        btn.dataset.state = "done";
        btn.style.backgroundColor = "#28a745";
    })
    .catch((e) => {
        console.error("送信エラー:", e);
        alert("サーバーへの送信に失敗しました。\n(ブラウザ単体テストではこのエラーが出ますが、動作ロジックは正常です)");
        btn.textContent = "登録";
        btn.disabled = false;
    });
}

window.addEventListener("beforeunload", function () {
    try { navigator.sendBeacon("/done"); } catch (e) { /* ignore */ }
});
</script>
</body>
</html>
