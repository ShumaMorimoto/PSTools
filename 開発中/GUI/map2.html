<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>
      Leaflet.DistortableImageを使ってLeafletで画像を重ねて表示してみた（画像の回転、拡縮、移動）｜メモ｜ACTABA
    </title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-distortableimage@0.21.9/dist/vendor.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-distortableimage@0.21.9/dist/leaflet.distortableimage.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-distortableimage@0.21.9/dist/vendor.js"></script>
    <script src="https://unpkg.com/leaflet-distortableimage@0.21.9/dist/leaflet.distortableimage.js"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>
  <body>
    ※<a href="https://maps.gsi.go.jp/development/ichiran.html">地理院タイル</a
    >から切り出した画像を表示しています。<br />
    <div id="map" style="width: 100%; height: 100%"></div>
    <script>
      let map;
      let imgLayer;

      var imageMap = {
        url: "shutsujin.png",
        width: 537,
        height: 484,
      };
      var imageBase = {
        url: "example_base.jpg",
        width: 554,
        height: 472,
      };

      // 地図初期化
      var imageBounds = L.latLngBounds(
        [0, 0],
        [imageBase.height, imageBase.width]
      );
      map = L.map("map", {
        crs: L.CRS.Simple,
        maxBounds: imageBounds.pad(0.5),
        maxZoom: 3,
      });
      map.fitBounds(imageBounds);
      L.imageOverlay(imageBase.url, imageBounds).addTo(map);

      map.whenReady(function () {
        imgLayer = L.distortableImageOverlay(imageMap.url, {
          actions: [
            L.DragAction,
            L.ScaleAction,
            /*L.DistortAction,*/ L.RotateAction,
            L.FreeRotateAction,
            /*L.LockAction,*/ L.OpacityAction /*L.BorderAction,*/,
            /* L.ExportAction,*/ /*L.DeleteAction,*/ L.RestoreAction,
          ],
        }).addTo(map);
      });
    </script>
  </body>
</html>
