<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MapSelector</title>

    <!-- Leaflet 本体 -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- leaflet-toolbar -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-toolbar@0.4.0-alpha.2/dist/leaflet.toolbar.css"
    />
    <script src="https://unpkg.com/leaflet-toolbar@0.4.0-alpha.2/dist/leaflet.toolbar.js"></script>

    <!-- leaflet-distortableimage -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-distortableimage@latest/dist/leaflet.distortableimage.css"
    />
    <script src="https://unpkg.com/leaflet-distortableimage@latest/dist/leaflet.distortableimage.js"></script>

    <!-- ExtraMarkers -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/leaflet-extra-markers@1.2.2/dist/css/leaflet.extra-markers.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/leaflet-extra-markers@1.2.2/dist/js/leaflet.extra-markers.min.js"></script>

    <!-- Geocoder -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"
    />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"
    />

    <style>
          html,
          body {
            height: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            font-family: sans-serif;
          }

          #controls {
            padding: 8px;
            background: #f0f0f0;
            border-bottom: 1px solid #ccc;
            display: flex;
            gap: 10px;
            height: 56px;
            box-sizing: border-box;
            align-items: center;
            z-index: 1000;
          }

          #map {
            flex: 1;
            width: 100%;
            background-color: #ddd;
            cursor: crosshair;
          }

          #pointList {
            flex: 1;
            padding: 5px;
            height: 34px;
          }

          button,
          label.btn {
            box-sizing: border-box;
            padding: 0 12px;
            cursor: pointer;
            border: none;
            background: #007bff;
            color: #fff;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            height: 34px;
            line-height: 34px;
            font-size: 14px;
            white-space: nowrap;
          }
          .center-handle-ui {
            width: 20px;
            height: 20px;
            background: #00aaff;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 4px rgba(0, 0, 0, 0.4);
          }

          .radius-handle-ui {
            width: 16px;
            height: 16px;
            background: #ff4444;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 0 4px rgba(0, 0, 0, 0.4);
          }
          .reorder-target {
            filter: drop-shadow(0 0 6px yellow);
          }
          button.active {
            background-color: #007bff !important;
            color: white !important;
            border-color: #0056b3 !important;
          }
          button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background-color: #ccc !important;
            color: #666 !important;
          }
          input[type="file"] {
            display: none;
          }
    </style>
  </head>

  <body>
    <div id="controls">
      <!-- 画像 -->
      <button id="imageActionBtn" class="btn">
        <i class="fas fa-upload"></i>
        <span class="label">画像追加</span>
      </button>
      <input type="file" id="imageInput" accept="image/*" />

      <!-- 町字 -->
      <button id="townActionBtn" class="btn">
        <i class="fas fa-map"></i>
        <span class="label">町字追加</span>
      </button>

      <!-- 領域 -->
      <button id="areaActionBtn" class="btn">
        <i class="fas fa-draw-polygon"></i>
        <span class="label">領域追加</span>
      </button>

      <!-- GA（最適化） -->
      <button id="gaActionBtn" class="btn">
        <i class="fas fa-route"></i>
        <span class="label">GA処理</span>
      </button>

      <!-- 分割処理 -->
      <button id="splitActionBtn" class="btn">
        <i class="fas fa-cut"></i>
        <span class="label">経路分割</span>
      </button>

      <!-- キャンセル -->
      <button id="cancelActionBtn" class="btn">
        <i class="fas fa-times"></i>
        <span class="label">キャンセル</span>
      </button>

      <select id="pointList">
        <option>読み込み中...</option>
      </select>

      <!-- GPX追加 -->
      <label for="gpxInput" class="btn">
        <i class="fas fa-map-marker-alt"></i>
        <span class="label">GPX追加</span>
      </label>
      <input type="file" id="gpxInput" accept=".gpx" />

      <!-- GPX保存 -->
      <button id="gpxSaveBtn" class="btn">
        <i class="fas fa-save"></i>
        <span class="label">GPX保存</span>
      </button>

      <!-- 住所更新 -->
      <button id="reFetchBtn" class="btn">
        <i class="fas fa-sync-alt"></i>
        <span class="label">住所更新</span>
      </button>

      <!-- クリア -->
      <button id="clearMarkersBtn" class="btn">
        <i class="fas fa-trash"></i>
        <span class="label">クリア</span>
      </button>
    </div>

    <div id="map"></div>

    <script type="module">
      import MapSelector from "./js/map-selector.js";
      import GPXService from "./js/gpx-service.js";
      import {
        callApi,
        pollApi,
        initialize,
        shutdown,
      } from "/runapp/lib/js/api.js";

      const params = new URLSearchParams(window.location.search);

      const DEFAULT_LAT = 35.677605;
      const DEFAULT_LNG = 139.758496;
      const DEFAULT_ZOOM = 16;

      const initialLat = parseFloat(params.get("lat")) || DEFAULT_LAT;
      const initialLng = parseFloat(params.get("lng")) || DEFAULT_LNG;
      const initialZoom = parseInt(params.get("zoom"), 10) || DEFAULT_ZOOM;

      const gpxService = new GPXService();
      const mapSelector = new MapSelector({
        mapId: "map",
        controls: {
          imageInputId: "imageInput",
          imageActionBtnId: "imageActionBtn",
          townActionBtnId: "townActionBtn",
          areaActionBtnId: "areaActionBtn",
          splitActionBtnId: "splitActionBtn",
          gaActionBtnId: "gaActionBtn",
          cancelActionBtnId: "cancelActionBtn",
          gpxInputId: "gpxInput",
          gpxSaveId: "gpxSaveBtn",
          reFetchBtnId: "reFetchBtn",
          pointListId: "pointList",
          clearMarkersBtnId: "clearMarkersBtn",
        },
        gpxService,
        initialView: [initialLat, initialLng, initialZoom],
      });

      // -----------------------------
      // ページロード時に初期データを反映
      // -----------------------------
      window.addEventListener("load", async () => {
        const initData = await initialize();
        if (initData) {
          gpxService.setModel(initData); // JSONとしてロード（必要に応じてXML対応）
          console.log("Initial data loaded from server");
        }
        mapSelector.init();
      });

      // ブラウザ終了時に shutdown を呼ぶ
      window.addEventListener("beforeunload", () => {
        navigator.sendBeacon("/shutdown", "{}");
      });
    </script>
  </body>
</html>
