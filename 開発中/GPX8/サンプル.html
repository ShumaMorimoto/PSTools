<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Geo API Workflow</title>
    <script type="module">
        import { callApi } from "/lib/js/api.js";

        // 取得した地点データを保持する変数
        let currentPoints = [];

        // 1. 町字取得 -> 地点配列(trkpt)を取り出して保持
        async function onFetch() {
            const keyword = document.getElementById("target").value;
            const gpx = await callApi("FromCityTowns", keyword);
            
            // GPXService の戻り値から trkpt 配列を抽出
            // 構造: Model.trk[0].trkseg[0].trkpt
            currentPoints = gpx.Model.trk.trkseg.trkpt;
            
            updateStatus(`取得完了: ${currentPoints.length} 件`, currentPoints);
        }

        // 2. 保持している地点データを KMeansCluster に投げる
        async function onCluster() {
            if (currentPoints.length === 0) return alert("先にデータを取得してください");
            
            const clusters = await callApi("KMeansCluster", currentPoints);
            updateStatus("クラスタリング完了", clusters);
        }

        // 3. 保持している地点データを TSPSolver に投げる
        async function onTsp() {
            if (currentPoints.length === 0) return alert("先にデータを取得してください");

            const route = await callApi("TSPSolver", currentPoints);
            updateStatus("ルート最適化完了", route);
        }

        // --- 補助関数 ---
        function updateStatus(msg, data) {
            document.getElementById("msg").textContent = msg;
            document.getElementById("status").textContent = JSON.stringify(data, null, 2);
        }

        window.onFetch = onFetch;
        window.onCluster = onCluster;
        window.onTsp = onTsp;
    </script>
</head>
<body>
    <h1>API Workflow</h1>
    
    <input type="text" id="target" value="横須賀市" />
    <button onclick="onFetch()">1. 町字取得</button>
    <button onclick="onCluster()">2. クラスタ実行</button>
    <button onclick="onTsp()">3. ルート最適化</button>

    <h2 id="msg">待機中</h2>
    <pre id="status" style="background:#eee; padding:10px; max-height:500px; overflow:auto;">{}</pre>
</body>
</html>
