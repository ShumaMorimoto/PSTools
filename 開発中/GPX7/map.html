<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MapSelector</title>
    <link rel="icon" href="data:," />

    <!-- Leaflet 本体 -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- leaflet-toolbar -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-toolbar@0.4.0-alpha.2/dist/leaflet.toolbar.css"
    />
    <script src="https://unpkg.com/leaflet-toolbar@0.4.0-alpha.2/dist/leaflet.toolbar.js"></script>

    <!-- leaflet-distortableimage -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-distortableimage@latest/dist/leaflet.distortableimage.css"
    />
    <script src="https://unpkg.com/leaflet-distortableimage@latest/dist/leaflet.distortableimage.js"></script>

    <!-- ExtraMarkers -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/leaflet-extra-markers@1.2.2/dist/css/leaflet.extra-markers.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/leaflet-extra-markers@1.2.2/dist/js/leaflet.extra-markers.min.js"></script>

    <!-- leaflet-contextmenu -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-contextmenu@1.4.0/dist/leaflet.contextmenu.css"
    />
    <script src="https://unpkg.com/leaflet-contextmenu@1.4.0/dist/leaflet.contextmenu.js"></script>

    <!-- Geocoder -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"
    />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <!-- GeoSearch -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-geosearch@latest/dist/geosearch.css"
    />
    <script src="https://unpkg.com/leaflet-geosearch@latest/dist/geosearch.umd.js"></script>

    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"
    />

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        font-family: sans-serif;
      }

      #controls {
        padding: 8px;
        background: #f0f0f0;
        border-bottom: 1px solid #ccc;
        display: flex;
        gap: 10px;
        height: 56px;
        box-sizing: border-box;
        align-items: center;
        z-index: 1000;
      }

      #map {
        flex: 1;
        width: 100%;
        background-color: #ddd;
        cursor: crosshair;
      }

      #pointList {
        flex: 1;
        padding: 5px;
        height: 34px;
      }

      button,
      label.btn {
        box-sizing: border-box;
        padding: 0 12px;
        cursor: pointer;
        border: none;
        background: #007bff;
        color: #fff;
        border-radius: 4px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        height: 34px;
        line-height: 34px;
        font-size: 14px;
        white-space: nowrap;
      }

      .center-handle-ui {
        width: 20px;
        height: 20px;
        background: #00aaff;
        border-radius: 50%;
        border: 3px solid white;
        box-shadow: 0 0 4px rgba(0, 0, 0, 0.4);
      }

      .radius-handle-ui {
        width: 16px;
        height: 16px;
        background: #ff4444;
        border-radius: 50%;
        border: 2px solid white;
        box-shadow: 0 0 4px rgba(0, 0, 0, 0.4);
      }

      .reorder-target {
        filter: drop-shadow(0 0 6px yellow);
      }

      button.active {
        background-color: #007bff !important;
        color: white !important;
        border-color: #0056b3 !important;
      }

      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        background-color: #ccc !important;
        color: #666 !important;
      }

      input[type="file"] {
        display: none;
      }

      .dropdown {
        position: relative;
      }

      .dropdown-menu {
        position: absolute;
        top: 40px;
        left: 0;
        background: white;
        border: 1px solid #ccc;
        border-radius: 4px;
        display: none;
        flex-direction: column;
        min-width: 140px;
        z-index: 2000;
      }

      .dropdown-menu .dropdown-item {
        padding: 8px 12px;
        cursor: pointer;
        white-space: nowrap;
      }

      .dropdown-menu .dropdown-item:hover {
        background: #eee;
      }

      .layer-toggle .toggle-btn {
        display: block;
        width: 26px;
        height: 26px;
        line-height: 26px;
        text-align: center;
        background: #fff;
        border-bottom: 1px solid #ccc;
        cursor: pointer;
        font-size: 14px;
        user-select: none;
      }

      .layer-toggle .toggle-btn:last-child {
        border-bottom: none;
      }

      .layer-toggle .toggle-btn.active {
        background: #007bff;
        color: white;
      }

      /* ★★★ 追加：汎用トースト通知 ★★★ */
      .toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(51, 51, 51, 0.9);
        color: #fff;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 14px;
        opacity: 0;
        transition: opacity 0.3s ease;
        z-index: 9999;
      }

      .toast.show {
        opacity: 1;
      }

      .toast.hidden {
        display: none;
      }
    </style>
  </head>

  <body>
    <div id="controls">
      <!-- 画像 -->
      <button id="imageActionBtn" class="btn">
        <i class="fas fa-upload"></i>
        <span class="label">画像追加</span>
      </button>
      <input type="file" id="imageInput" accept="image/*" />

      <!-- 町字 -->
      <button id="townActionBtn" class="btn">
        <i class="fas fa-map"></i>
        <span class="label">町字追加</span>
      </button>

      <!-- 領域 -->
      <button id="areaActionBtn" class="btn">
        <i class="fas fa-draw-polygon"></i>
        <span class="label">領域追加</span>
      </button>

      <!-- キャンセル -->
      <button id="cancelActionBtn" class="btn">
        <i class="fas fa-times"></i>
        <span class="label">キャンセル</span>
      </button>

      <select id="pointList">
        <option>読み込み中...</option>
      </select>

      <!-- 経路更新 -->
      <button id="updateRouteBtn" class="btn">
        <i class="fas fa-route"></i>
        <span class="label">経路更新</span>
      </button>

      <!-- 住所更新 -->
      <button id="reFetchBtn" class="btn">
        <i class="fas fa-sync-alt"></i>
        <span class="label">住所更新</span>
      </button>

      <!-- GPX追加 -->
      <label for="gpxInput" class="btn">
        <i class="fas fa-map-marker-alt"></i>
        <span class="label">GPX追加</span>
      </label>
      <input type="file" id="gpxInput" accept=".gpx" />

      <!-- GPX保存 -->
      <button id="gpxSaveBtn" class="btn">
        <i class="fas fa-save"></i>
        <span class="label">GPX保存</span>
      </button>

      <!-- クリア -->
      <button id="clearMarkersBtn" class="btn">
        <i class="fas fa-trash"></i>
        <span class="label">クリア</span>
      </button>
    </div>

    <div id="map"></div>

    <!-- ★★★ 追加：トースト通知領域 ★★★ -->
    <div id="toast" class="toast hidden"></div>

    <script type="module">
      import MapSelector from "./js/map-selector.js";
      import GPXService from "./js/gpx-service.js";
      import { initialize } from "/runapp/lib/js/api.js";

      const params = new URLSearchParams(window.location.search);

      const DEFAULT_LAT = 35.677605;
      const DEFAULT_LNG = 139.758496;
      const DEFAULT_ZOOM = 16;

      const initialLat = parseFloat(params.get("lat")) || DEFAULT_LAT;
      const initialLng = parseFloat(params.get("lng")) || DEFAULT_LNG;
      const initialZoom = parseInt(params.get("zoom"), 10) || DEFAULT_ZOOM;

      const gpxService = new GPXService();
      const mapSelector = new MapSelector({
        mapId: "map",
        controls: {
          imageInputId: "imageInput",
          imageActionBtnId: "imageActionBtn",
          townActionBtnId: "townActionBtn",
          areaActionBtnId: "areaActionBtn",
          cancelActionBtnId: "cancelActionBtn",
          pointListId: "pointList",
          updateRouteBtnId: "updateRouteBtn",
          reFetchBtnId: "reFetchBtn",
          gpxInputId: "gpxInput",
          gpxSaveId: "gpxSaveBtn",
          clearMarkersBtnId: "clearMarkersBtn",
          toastId: "toast",
        },
        gpxService,
        initialView: [initialLat, initialLng, initialZoom],
      });

      // -----------------------------
      // ページロード時に初期データを反映
      // -----------------------------
      window.addEventListener("load", async () => {
        const initData = await initialize();
        mapSelector.init(initData);
      });

      // ブラウザ終了時に shutdown を呼ぶ
      window.addEventListener("beforeunload", () => {
        navigator.sendBeacon("/shutdown", "{}");
      });
    </script>
  </body>
</html>
