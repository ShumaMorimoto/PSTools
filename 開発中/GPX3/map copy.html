<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map Selector + 画像重ね合わせツール（修正版）</title>

    <!-- Leaflet 本体 -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- leaflet-toolbar -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-toolbar@0.4.0-alpha.2/dist/leaflet.toolbar.css"
    />
    <script src="https://unpkg.com/leaflet-toolbar@0.4.0-alpha.2/dist/leaflet.toolbar.js"></script>

    <!-- leaflet-distortableimage -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-distortableimage@latest/dist/leaflet.distortableimage.css"
    />
    <script src="https://unpkg.com/leaflet-distortableimage@latest/dist/leaflet.distortableimage.js"></script>

    <!-- ExtraMarkers -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/leaflet-extra-markers@1.2.2/dist/css/leaflet.extra-markers.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/leaflet-extra-markers@1.2.2/dist/js/leaflet.extra-markers.min.js"></script>

    <!-- Geocoder -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"
    />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"
    />

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        font-family: sans-serif;
      }

      #controls {
        padding: 8px;
        background: #f0f0f0;
        border-bottom: 1px solid #ccc;
        display: flex;
        gap: 10px;
        height: 56px;
        box-sizing: border-box;
        align-items: center;
        z-index: 1000;
      }

      #map {
        flex: 1;
        width: 100%;
        background-color: #ddd;
        cursor: crosshair;
      }

      /* リストは元のまま（広め＋flex:1） */
      #pointList {
        flex: 1;
        padding: 5px;
        height: 34px;
      }

      /* すべての「ボタン見た目」の高さをガチ固定で揃える */
      button,
      label.btn {
        box-sizing: border-box;
        padding: 0 12px;
        cursor: pointer;
        border: none;
        background: #007bff;
        color: #fff;
        border-radius: 4px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        height: 34px;
        line-height: 34px; /* テキスト高さもボタンに合わせる */
        font-size: 14px;
        white-space: nowrap;
      }

      button:hover,
      label.btn:hover {
        background: #0056b3;
      }

      button.locked {
        background: #dc3545;
      }

      button.locked:hover {
        background: #c82333;
      }

      input[type="file"] {
        display: none;
      }

      #info-box {
        font-family: monospace;
        font-size: 13px;
        background: white;
        padding: 6px 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }

      .map-locked .leaflet-distortable-image-overlay,
      .map-locked img.leaflet-image-layer {
        pointer-events: none !important;
        cursor: crosshair !important;
        opacity: 0.85 !important;
        z-index: 200 !important;
      }
    </style>
  </head>

  <body>
    <div id="controls">
      <!-- 画像追加 -->
      <label for="imageInput" class="btn">
        <i class="fas fa-upload"></i> 画像を追加
      </label>
      <input type="file" id="imageInput" accept="image/*" />

      <!-- 位置調整 -->
      <button id="toggleLockBtn" class="btn">
        <i class="fas fa-lock-open"></i> <span>位置調整モード</span>
      </button>

      <!-- ポイントリスト（元の大きさのまま） -->
      <select id="pointList">
        <option>読み込み中...</option>
      </select>

      <!-- GPX追加・保存（リストの右） -->
      <label for="gpxInput" class="btn">
        <i class="fas fa-map-marker-alt"></i> GPX追加
      </label>
      <input type="file" id="gpxInput" accept=".gpx" />

      <button id="gpxSaveBtn" class="btn">
        <i class="fas fa-save"></i> GPX保存
      </button>

      <!-- 操作 -->
<button id="clearMarkersBtn" class="btn">
  <i class="fas fa-trash"></i> クリア
</button>

<button id="finishBtn" class="btn">
  <i class="fas fa-check"></i> 登録
</button>
      <div id="info-box">
        座標: <span id="coords">マップをクリックしてください</span>
      </div>
    </div>

    <div id="map"></div>

    <script type="module">
      import MapSelector from "./js/map-selector.js";

      const psLatPlaceholder = "$CenterLat";
      const psLngPlaceholder = "$CenterLng";
      const psZoomPlaceholder = "$Zoom";
      const psMapDataPlaceholder = "$MapData";

      const DEFAULT_LAT = 35.677605;
      const DEFAULT_LNG = 139.758496;
      const DEFAULT_ZOOM = 16;
      const DEFAULT_POINTS = [];

      const initialLat = isNaN(Number(psLatPlaceholder))
        ? DEFAULT_LAT
        : Number(psLatPlaceholder);
      const initialLng = isNaN(Number(psLngPlaceholder))
        ? DEFAULT_LNG
        : Number(psLngPlaceholder);
      const initialZoom = isNaN(Number(psZoomPlaceholder))
        ? DEFAULT_ZOOM
        : Number(psZoomPlaceholder);

      let initialPoints;
      try {
        initialPoints = JSON.parse(psMapDataPlaceholder);
        if (!Array.isArray(initialPoints)) initialPoints = DEFAULT_POINTS;
      } catch (e) {
        initialPoints = DEFAULT_POINTS;
      }

      const mapSelector = new MapSelector({
        mapId: "map",
        controls: {
          imageInputId: "imageInput",
          toggleLockBtnId: "toggleLockBtn",
          gpxInputId: "gpxInput",
          gpxSaveId: "gpxSaveBtn",
          pointListId: "pointList",
          clearMarkersBtnId: "clearMarkersBtn",
          finishBtnId: "finishBtn",
          coordsId: "coords",
        },
        initialPoints,
        initialView: [initialLat, initialLng, initialZoom],
      });

      mapSelector.init();
    </script>
  </body>
</html>
