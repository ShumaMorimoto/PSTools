<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>Leaflet：自治体境界（動的） + 町字マーカーのみ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 100vh; }
        button { position: absolute; top: 10px; right: 10px; z-index: 1000; padding: 10px; background: white; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <div id="map"></div>
    <button id="showTownMarkersBtn">この自治体の町字をマーカーで表示</button>

    <script>
        const map = L.map('map').setView([38.2682, 140.8694], 14); // 初期位置：仙台市周辺
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        let municipalityLayer;           // 自治体境界レイヤー
        let townMarkers = L.layerGroup().addTo(map);  // 町字マーカーグループ
        let currentAreaId = null;        // 現在の自治体 area ID（Overpass用）

        // osmtogeojsonライブラリ（境界GeoJSON変換用）
        const script = document.createElement('script');
        script.src = 'https://unpkg.com/osmtogeojson@3.0.0-beta.5/osmtogeojson.js';
        document.head.appendChild(script);

        // 地図移動時に自治体境界を更新
        function updateMunicipalityBoundary() {
            if (municipalityLayer) map.removeLayer(municipalityLayer);
            townMarkers.clearLayers();
            currentAreaId = null;
            document.getElementById('showTownMarkersBtn').disabled = true;

            const center = map.getCenter();
            const lat = center.lat.toFixed(6);
            const lon = center.lng.toFixed(6);

            // 1. 中心点を含む admin_level=7 の area ID を取得
            const areaQuery = `
                [out:json][timeout:25];
                is_in(${lat},${lon})->.a;
                area(pivot.a)[boundary=administrative][admin_level=7];
                out ids;
            `;

//            fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(areaQuery)}`)
            fetch(`https://overpass-api.de/api/interpreter?data=${areaQuery}`)
                .then(res => res.json())
                .then(data => {
                    if (data.elements.length === 0) {
                        console.warn('自治体が見つかりませんでした');
                        return;
                    }

                    // relation ID → area ID（+3600000000）
                    currentAreaId = data.elements[0].id + 3600000000;

                    // 2. その自治体の境界ポリゴンを取得して表示
                    const boundaryQuery = `
                        [out:json][timeout:25];
                        rel(area:${currentAreaId})[boundary=administrative][admin_level=7];
                        out geom;
                    `;

                    fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(boundaryQuery)}`)
                        .then(res => res.json())
                        .then(bdata => {
                            if (bdata.elements.length > 0) {
                                const geojson = osmtogeojson(bdata);
                                municipalityLayer = L.geoJSON(geojson, {
                                    style: {
                                        color: 'red',
                                        weight: 5,
                                        fillOpacity: 0.1
                                    }
                                }).addTo(map);

                                // 自治体名をポップアップ（あれば）
                                const name = geojson.features[0].properties.tags?.name || '不明';
                                municipalityLayer.bindPopup(`自治体: ${name}`).openPopup();

                                map.fitBounds(municipalityLayer.getBounds());
                                document.getElementById('showTownMarkersBtn').disabled = false;
                            }
                        });
                })
                .catch(err => console.error(err));
        }

        // ボタンクリック：自治体内全町字をマーカーで表示（境界は表示しない）
        document.getElementById('showTownMarkersBtn').onclick = function() {
            if (!currentAreaId) {
                alert('先に自治体境界を読み込んでください');
                return;
            }

            townMarkers.clearLayers();

            const query = `
                [out:json][timeout:30];
                area(${currentAreaId})->.searchArea;
                node(area.searchArea)["place"~"^(neighbourhood|quarter)$"];
                out body;
            `;

            fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`)
                .then(res => res.json())
                .then(data => {
                    if (data.elements.length === 0) {
                        alert('この自治体に登録された町字点が見つかりませんでした');
                        return;
                    }

                    data.elements.forEach(node => {
                        const marker = L.marker([node.lat, node.lon], {
                            icon: L.divIcon({
                                className: 'town-marker',
                                html: '●',
                                iconSize: [12, 12],
                                iconAnchor: [6, 6]
                            })
                        });
                        marker.bindPopup(node.tags.name || '町字');
                        marker.addTo(townMarkers);
                    });

                    alert(`町字マーカー ${data.elements.length} 件を表示しました`);
                })
                .catch(err => console.error(err));
        };

        // 地図移動時に自動更新
        map.on('moveend', updateMunicipalityBoundary);

        // 初回実行
        updateMunicipalityBoundary();
    </script>
</body>
</html>
