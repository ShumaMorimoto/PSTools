<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>Leaflet 町字境界表示</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>#map { height: 100vh; }</style>
</head>
<body>
    <div id="map"></div>
    <script>
        const map = L.map('map').setView([35.6895, 139.6917], 15); // ズームを高めに（町字が見えるレベル）
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let boundaryLayer; // 既存レイヤー削除用

        function showTownBoundaries() {
            if (boundaryLayer) map.removeLayer(boundaryLayer);

            const center = map.getCenter();
            const lat = center.lat.toFixed(6);
            const lon = center.lng.toFixed(6);

            // クエリ: 中心点を含むadmin_level=9〜11の行政境界（町字レベル）をすべて取得
            const query = `
                [out:json][timeout:25];
                (
                  rel(around:5000,${lat},${lon})[boundary=administrative][admin_level=9];
                  rel(around:5000,${lat},${lon})[boundary=administrative][admin_level=10];
                  rel(around:5000,${lat},${lon})[boundary=administrative][admin_level=11];
                );
                out geom;
            `;

            fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`)
                .then(response => response.json())
                .then(data => {
                    if (data.elements.length > 0) {
                        const geojson = osmtogeojson(data);
                        boundaryLayer = L.geoJSON(geojson, {
                            style: { color: 'blue', weight: 3, fillOpacity: 0.2 },
                            onEachFeature: function(feature, layer) {
                                if (feature.properties.tags && feature.properties.tags.name) {
                                    layer.bindPopup(feature.properties.tags.name); // 町字名を表示
                                }
                            }
                        }).addTo(map);

                        // すべての町字境界にフィット（複数ある場合全体を表示）
                        map.fitBounds(boundaryLayer.getBounds());
                    } else {
                        alert('この地点の町字境界データが見つかりませんでした（OSMに未登録の可能性）');
                    }
                })
                .catch(err => console.error(err));
        }

        map.on('moveend', showTownBoundaries);
        showTownBoundaries(); // 初回実行

        // osmtogeojsonライブラリ（必須）
        const script = document.createElement('script');
        script.src = 'https://unpkg.com/osmtogeojson@3.0.0-beta.5/osmtogeojson.js';
        document.head.appendChild(script);
    </script>
</body>
</html>
