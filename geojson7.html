<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Leaflet クリックで自治体境界＋町字マーク</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    #map { height: 100vh; width: 100%; }
    .leaflet-control-town-button {
      background: white;
      padding: 5px 10px;
      border: 2px solid rgba(0,0,0,0.2);
      border-radius: 4px;
      cursor: pointer;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([35.6895, 139.6917], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let currentBoundaryLayer = null;   // 自治体境界レイヤー
    let currentTownMarkers = null;     // 町字マーカーレイヤー
    let townButton = null;             // 町字マークボタン

    map.on('click', async function(e) {
      const lat = e.latlng.lat.toFixed(6);
      const lng = e.latlng.lng.toFixed(6);

      console.clear();
      console.log('=== クリック位置 ===');
      console.log(`緯度: ${lat}`);
      console.log(`経度: ${lng}`);

      // 1. Nominatim でリバースジオコーディング
      const nominatimRes = await fetch(
        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${e.latlng.lat}&lon=${e.latlng.lng}&addressdetails=1&zoom=14`
      );
      const data = await nominatimRes.json();

      const address = data.address;
      const pref = address.state || address.province || address.region; // 都道府県
      const city = address.city || address.town || address.village || address.county; // 市区町村（区含む）

      console.log('=== 住所情報 (Nominatim) ===');
      console.log('都道府県:', pref);
      console.log('市区町村:', city);
      console.log('フル住所:', data.display_name);

      if (!pref || !city) {
        console.warn('市区町村が取得できませんでした');
        return;
      }

      // 既存レイヤー・ボタン削除
      if (currentBoundaryLayer) map.removeLayer(currentBoundaryLayer);
      if (currentTownMarkers) map.removeLayer(currentTownMarkers);
      if (townButton) map.removeControl(townButton);

      // 2. 自治体境界表示（sankichiサービスを使うためにコードが必要）
      // 簡易的に、Nominatimの結果からJISコードが取れる場合が多いが、
      // 確実にするため静的マップでよくあるパターンを一部用意（実運用では全対応マップ推奨）
      const cityCodeMap = {
        '仙台市青葉区': '04101',
        '仙台市宮城野区': '04102',
        '仙台市若林区': '04103',
        '仙台市太白区': '04104',
        '仙台市泉区': '04105',
        '葉山町': '14301',
        // 必要に応じて追加
      };

      let cityCode = null;
      // Nominatimのextratagsにrefがあればそれを使う
      if (data.extratags && data.extratags.ref) {
        cityCode = data.extratags.ref.replace(/^0+/, ''); // 先頭0除去対策
      }
      // なければ手動マップから
      if (!cityCode && cityCodeMap[city]) cityCode = cityCodeMap[city];

      if (cityCode) {
        try {
          const boundaryUrl = `https://shikuchoson-boundaries.sankichi.app/${cityCode}.geojson`;
          const boundaryRes = await fetch(boundaryUrl);
          if (boundaryRes.ok) {
            const geojson = await boundaryRes.json();
            currentBoundaryLayer = L.geoJSON(geojson, {
              style: { color: '#ff0000', weight: 5, opacity: 0.8, fillOpacity: 0.1 }
            }).addTo(map);
            map.fitBounds(currentBoundaryLayer.getBounds());
            console.log('自治体境界を表示しました (コード:', cityCode, ')');
          } else {
            console.warn('境界GeoJSON取得失敗:', boundaryRes.status);
          }
        } catch (err) {
          console.error('境界取得エラー:', err);
        }
      } else {
        console.warn('市区町村コードが取得できませんでした。境界表示スキップ');
      }

      // 3. 町字マークボタン追加
      townButton = L.control({ position: 'topright' });
      townButton.onAdd = function() {
        const div = L.DomUtil.create('div', 'leaflet-control-town-button');
        div.innerHTML = '町字マーク';
        div.title = 'この自治体の全町字にマーカーを表示';
        div.onclick = async function() {
          if (currentTownMarkers) {
            map.removeLayer(currentTownMarkers);
            currentTownMarkers = null;
            div.innerHTML = '町字マーク';
            return;
          }

          try {
            const townUrl = `https
