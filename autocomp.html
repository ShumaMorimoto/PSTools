<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaflet + Custom Autocomplete (Fast)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tarekraafat/autocomplete.js@10.2.7/dist/css/autoComplete.01.min.css">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { width: 100%; height: 100%; z-index: 1; }
        .search-container {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 90%; max-width: 400px;
        }
        #autoComplete {
            width: 100%; height: 50px; padding: 0 20px 0 50px; font-size: 18px;
            border-radius: 25px; border: 1px solid #ccc; outline: none;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="%23999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>');
            background-repeat: no-repeat; background-position: 15px center;
            background-color: white;
        }
        .history-item { color: #2c3e50; font-weight: bold; }
        .history-badge {
            font-size: 10px; background: #eee; color: #666; padding: 2px 5px;
            border-radius: 4px; margin-right: 5px;
        }
        /* API検索中のロード表示用 */
        .loading { background-image: url('https://cdnjs.cloudflare.com/ajax/libs/galleriffic/2.0.1/css/loader.gif') !important; background-size: 20px; }
    </style>
</head>
<body>

    <div class="search-container">
        <!-- フォームで囲うことでスマホのキーボードの「検索/Go」ボタンに対応しやすくする -->
        <form id="searchForm" onsubmit="return false;">
            <input id="autoComplete" type="search" dir="ltr" spellcheck=false autocorrect="off" autocomplete="off" autocapitalize="off" placeholder="住所検索 (履歴:即時 / 新規:Enter)">
        </form>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tarekraafat/autocomplete.js@10.2.7/dist/autoComplete.min.js"></script>

    <script>
        // --- 1. 地図初期化 ---
        const map = L.map('map').setView([35.681236, 139.767125], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        let currentMarker = null;

        // --- 2. 履歴管理関数 ---
        const STORAGE_KEY = 'map_search_history';
        
        function getHistory() {
            const history = localStorage.getItem(STORAGE_KEY);
            return history ? JSON.parse(history) : [];
        }

        function saveToHistory(item) {
            let history = getHistory();
            history = history.filter(h => h.display_name !== item.display_name);
            history.unshift(item);
            if (history.length > 10) history.pop();
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        }

        // --- 3. マーカー設置処理（共通化） ---
        function setLocation(lat, lon, displayName) {
            // 地図移動
            map.flyTo([lat, lon], 16);

            // マーカー設置
            if (currentMarker) map.removeLayer(currentMarker);
            currentMarker = L.marker([lat, lon]).addTo(map)
                .bindPopup(displayName)
                .openPopup();

            // 履歴保存
            saveToHistory({ display_name: displayName, lat: lat, lon: lon });
            
            // 入力欄を閉じる
            autoCompleteJS.close();
            autoCompleteJS.input.blur();
        }

        // --- 4. 外部API検索処理 ---
        async function searchApi(query) {
            const inputEl = document.getElementById("autoComplete");
            inputEl.classList.add("loading"); // ロード中アイコン

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&limit=5`);
                const data = await response.json();
                
                if (data && data.length > 0) {
                    // 最も確度の高い1件目を採用して移動
                    const topResult = data[0];
                    setLocation(topResult.lat, topResult.lon, topResult.display_name);
                    // 入力欄の文字を正式名称に書き換え
                    inputEl.value = topResult.display_name;
                } else {
                    alert("見つかりませんでした。");
                }
            } catch (error) {
                console.error(error);
                alert("検索中にエラーが発生しました。");
            } finally {
                inputEl.classList.remove("loading");
            }
        }

        // --- 5. autoComplete.js 設定 (履歴のみ検索) ---
        const autoCompleteJS = new autoComplete({
            selector: "#autoComplete",
            placeHolder: "住所検索...",
            threshold: 0, // 0文字から履歴を表示（フォーカス時など）
            data: {
                src: (query) => {
                    // ★ここが重要：常に履歴（ローカル）のみを返す
                    const history = getHistory();
                    // 履歴アイテムにフラグ
                    history.forEach(item => item.isHistory = true);
                    return history;
                },
                keys: ["display_name"],
                cache: false,
            },
            resultsList: {
                element: (list, data) => {
                    if (!data.results.length) {
                        // 履歴にない場合は「Enterで検索」を促す
                        const message = document.createElement("div");
                        message.style.padding = "10px";
                        message.style.color = "#888";
                        message.innerHTML = `履歴にありません。<br>Enterキーで <b>"${data.query}"</b> をWeb検索`;
                        list.prepend(message);
                    }
                },
                noResults: true,
                maxResults: 10,
            },
            resultItem: {
                element: (item, data) => {
                    const content = data.value.display_name;
                    // 全て履歴なのでバッジをつける
                    item.innerHTML = `<span class="history-badge">履歴</span> <span class="history-item">${content}</span>`;
                },
                highlight: true
            },
            events: {
                input: {
                    selection: (event) => {
                        // 履歴リストから選択された場合
                        const selection = event.detail.selection.value;
                        autoCompleteJS.input.value = selection.display_name;
                        setLocation(selection.lat, selection.lon, selection.display_name);
                    },
                    keydown: (event) => {
                        // Enterキーが押された時の処理
                        if (event.keyCode === 13) {
                            // 候補リストが開いていて、かつ選択中(cursorがある)の場合は
                            // autoComplete.jsのselectionイベントに任せるためここでは何もしない
                            const list = document.getElementById("autoComplete_list_1"); // デフォルトID
                            const activeItem = list ? list.querySelector('.autoComplete_selected') : null;
                            
                            if (!activeItem) {
                                // 候補を選んでいない状態でEnter -> API検索
                                event.preventDefault(); // フォーム送信防止
                                const query = autoCompleteJS.input.value;
                                if(query) searchApi(query);
                            }
                        }
                    }
                }
            }
        });
        
        // スマホなどでキーボードの「Go/検索」を押した場合の念の為のハンドラ
        document.getElementById('searchForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const query = document.getElementById('autoComplete').value;
            // 履歴リストが開いていないときだけAPI検索
            if(query && !document.querySelector('.autoComplete_selected')) {
                searchApi(query);
            }
        });

    </script>
</body>
</html>
