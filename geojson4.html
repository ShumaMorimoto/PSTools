<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>Leaflet 自治体境界 + 町字点マーク（Overpass動的）</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>#map { height: 100vh; }</style>
</head>
<body>
    <div id="map"></div>
    <button id="showCityTownsBtn" style="position:absolute;top:10px;right:100px;z-index:1000;padding:10px;background:white;">所属自治体の町字点</button>
    <button id="showAreaTownsBtn" style="position:absolute;top:10px;right:220px;z-index:1000;padding:10px;background:white;">周辺町字点 (5km)</button>

    <script>
        const map = L.map('map').setView([35.6895, 139.6917], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let municipalityLayer;      // 自治体境界
        let townMarkers = L.layerGroup().addTo(map);  // 町字マーカーグループ
        let currentAreaId = null;   // 現在の自治体area ID

        // osmtogeojsonライブラリ（境界用）
        const script = document.createElement('script');
        script.src = 'https://unpkg.com/osmtogeojson@3.0.0-beta.5/osmtogeojson.js';
        document.head.appendChild(script);

        // 自治体境界更新（moveend時）
        function updateMunicipalityBoundary() {
            if (municipalityLayer) map.removeLayer(municipalityLayer);
            townMarkers.clearLayers();
            currentAreaId = null;
            document.getElementById('showCityTownsBtn').disabled = true;

            const center = map.getCenter();
            const lat = center.lat.toFixed(6);
            const lon = center.lng.toFixed(6);

            // 1. 中心点を含むadmin_level=7のarea ID取得
            const areaQuery = `
                [out:json][timeout:25];
                is_in(${lat},${lon})->.a;
                area(pivot.a)[boundary=administrative][admin_level=7];
                out ids;
            `;

            fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(areaQuery)}`)
                .then(res => res.json())
                .then(data => {
                    if (data.elements.length > 0) {
                        currentAreaId = data.elements[0].id + 3600000000; // relation ID → area ID
                        const boundaryQuery = `
                            [out:json];
                            area(${currentAreaId})->.a;
                            rel(pivot.a)[boundary=administrative][admin_level=7];
                            out geom;
                        `;
                        fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(boundaryQuery)}`)
                            .then(res => res.json())
                            .then(bdata => {
                                if (bdata.elements.length > 0) {
                                    const geojson = osmtogeojson(bdata);
                                    municipalityLayer = L.geoJSON(geojson, {
                                        style: { color: 'red', weight: 5, fillOpacity: 0.1 }
                                    }).addTo(map);
                                    map.fitBounds(municipalityLayer.getBounds());
                                    document.getElementById('showCityTownsBtn').disabled = false;
                                }
                            });
                    } else {
                        alert('自治体境界が見つかりませんでした');
                    }
                });
        }

        // ボタン1: 所属自治体の全町字点（FromCityTowns相当）
        document.getElementById('showCityTownsBtn').onclick = function() {
            if (!currentAreaId) return;
            townMarkers.clearLayers();

            const query = `
                [out:json][timeout:25];
                area(${currentAreaId})->.a;
                node(area.a)["place"~"^(neighbourhood|quarter)$"];
                out body;
            `;

            fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`)
                .then(res => res.json())
                .then(data => {
                    data.elements.forEach(el => {
                        if (el.lat && el.lon) {
                            const marker = L.marker([el.lat, el.lon])
                                .bindPopup(el.tags.name || '町字')
                                .addTo(townMarkers);
                        }
                    });
                    alert(`町字点 ${data.elements.length} 件を表示しました`);
                });
        };

        // ボタン2: 中心周辺の町字点（FromAreaTowns相当、デフォ5km）
        document.getElementById('showAreaTownsBtn').onclick = function() {
            townMarkers.clearLayers();
            const center = map.getCenter();
            const radius = 5000; // 5km、必要に応じて変更

            const query = `
                [out:json][timeout:25];
                node(around:${radius},${center.lat},${center.lng})["place"~"^(neighbourhood|quarter)$"];
                out body;
            `;

            fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`)
                .then(res => res.json())
                .then(data => {
                    data.elements.forEach(el => {
                        if (el.lat && el.lon) {
                            L.marker([el.lat, el.lon])
                                .bindPopup(el.tags.name || '町字')
                                .addTo(townMarkers);
                        }
                    });
                    alert(`周辺町字点 ${data.elements.length} 件を表示しました`);
                });
        };

        map.on('moveend', updateMunicipalityBoundary);
        updateMunicipalityBoundary(); // 初回
    </script>
</body>
</html>
