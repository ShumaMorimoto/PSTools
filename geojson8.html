<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Leaflet クリックで自治体境界＋町字マーク（完全動的）</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    #map { height: 100vh; width: 100%; }
    .leaflet-control-town-button {
      background: white;
      padding: 5px 10px;
      border: 2px solid rgba(0,0,0,0.2);
      border-radius: 4px;
      cursor: pointer;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([35.6895, 139.6917], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let currentBoundaryLayer = null;
    let currentTownMarkers = null;
    let townButton = null;
    let cityCodeMap = null; // 動的マッピング

    // ページ読み込み時に市区町村コードマップを1回取得
    async function loadCityCodeMap() {
      if (cityCodeMap) return;
      try {
        const res = await fetch('https://madefor.github.io/jisx0402/api/v1/cities.json');
        const data = await res.json();
        cityCodeMap = {};
        data.forEach(item => {
          cityCodeMap[item.city] = item.jisx0402; // 市名 → コード
        });
        console.log('市区町村コードマップ取得完了（全国対応）');
      } catch (err) {
        console.error('コードマップ取得失敗:', err);
      }
    }

    // 初回クリック時にロード
    map.on('click', async function(e) {
      await loadCityCodeMap(); // 必要ならロード

      const lat = e.latlng.lat.toFixed(6);
      const lng = e.latlng.lng.toFixed(6);

      console.clear();
      console.log('=== クリック位置 ===');
      console.log(`緯度: ${lat}, 経度: ${lng}`);

      const nominatimRes = await fetch(
        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${e.latlng.lat}&lon=${e.latlng.lng}&addressdetails=1&extratags=1&zoom=14`
      );
      const data = await nominatimRes.json();

      const address = data.address;
      const pref = address.state || address.province || address.region;
      let city = address.city || address.town || address.village || address.county || address.suburb;

      console.log('=== 住所情報 (Nominatim) ===');
      console.log('都道府県:', pref);
      console.log('市区町村:', city);
      console.log('フル住所:', data.display_name);

      if (!pref || !city) {
        console.warn('市区町村が取得できませんでした');
        return;
      }

      // 既存クリア
      if (currentBoundaryLayer) map.removeLayer(currentBoundaryLayer);
      if (currentTownMarkers) map.removeLayer(currentTownMarkers);
      if (townButton) map.removeControl(townButton);

      // 市区町村コード取得（extratags優先 → マップ）
      let cityCode = null;
      if (data.extratags && data.extratags.ref) {
        cityCode = data.extratags.ref.replace(/^0+/, '').padStart(5, '0'); // 整形
        console.log('コード取得: Nominatim extratagsから', cityCode);
      } else if (cityCodeMap && cityCodeMap[city]) {
        cityCode = cityCodeMap[city];
        console.log('コード取得: マップから', cityCode);
      }

      if (cityCode) {
        try {
          const boundaryUrl = `https://shikuchoson-boundaries.sankichi.app/${cityCode}.geojson`;
          const boundaryRes = await fetch(boundaryUrl);
          if (boundaryRes.ok) {
            const geojson = await boundaryRes.json();
            currentBoundaryLayer = L.geoJSON(geojson, {
              style: { color: '#ff0000', weight: 5, opacity: 0.8, fillOpacity: 0.1 }
            }).addTo(map);
            map.fitBounds(currentBoundaryLayer.getBounds());
            console.log('自治体境界を表示（コード:', cityCode, ')');
          } else {
            console.warn('境界取得失敗:', boundaryRes.status);
          }
        } catch (err) {
          console.error('境界エラー:', err);
        }
      } else {
        console.warn('市区町村コード取得できず、境界表示スキップ');
      }

      // 町字マークボタン
      townButton = L.control({ position: 'topright' });
      townButton.onAdd = function() {
        const div = L.DomUtil.create('div', 'leaflet-control-town-button');
        div.innerHTML = '町字マーク';
        div.title = '全町字にマーカー表示';
        div.onclick = async function() {
          if (currentTownMarkers) {
            map.removeLayer(currentTownMarkers);
            currentTownMarkers = null;
            div.innerHTML = '町字マーク';
            return;
          }

          try {
            const townUrl = `https://geolonia.github.io/japanese-addresses/api/ja/${pref}/${city}.json`;
            console.log('町字取得:', townUrl);
            const townRes = await fetch(townUrl);
            if (!townRes.ok) throw new Error('失敗');

            const towns = await townRes.json();
            console.log(`町字: ${towns.length}件`);

            currentTownMarkers = L.layerGroup().addTo(map);
            towns.forEach(t => {
              if (t.lat && t.lng) {
                L.circleMarker([t.lat, t.lng], { radius: 4, color: '#3388ff', fillOpacity: 0.8 })
                  .bindPopup(t.town)
                  .addTo(currentTownMarkers);
              }
            });
            div.innerHTML = '町字解除';
          } catch (err) {
            console.error('町字エラー:', err);
            alert('町字取得失敗');
          }
        };
        return div;
      };
      townButton.addTo(map);
    });
  </script>
</body>
</html>
