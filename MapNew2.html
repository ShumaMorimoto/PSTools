<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Selector with Photo</title>

    <!-- Leaflet & Plugins -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- ExtraMarkers -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-extra-markers@1.2.2/dist/css/leaflet.extra-markers.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/leaflet-extra-markers@1.2.2/dist/js/leaflet.extra-markers.min.js"></script>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />

    <!-- Geocoder -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <style>
        html, body {
            height: 100%; margin: 0; padding: 0;
            display: flex; flex-direction: column; font-family: sans-serif;
        }

        /* コントロールバー */
        #controls {
            padding: 8px; background: #f0f0f0; border-bottom: 1px solid #ccc;
            display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
        }

        #map { flex: 1; width: 100%; background-color: #ddd; }

        /* UIパーツ */
        #pointList { min-width: 150px; max-width: 300px; padding: 5px; }
        
        button { padding: 5px 12px; cursor: pointer; }
        .btn-blue { background-color: #007bff; color: white; border: none; border-radius: 3px; }
        .btn-red  { background-color: #dc3545; color: white; border: none; border-radius: 3px; }
        .btn-green { background-color: #28a745; color: white; border: none; border-radius: 3px; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        /* 写真入力エリア（選択時のみ表示） */
        #photoArea {
            display: none; /* 初期は非表示 */
            align-items: center; gap: 5px;
            background: #e9ecef; padding: 4px 8px; border-radius: 4px; border: 1px solid #ccc;
        }
        #photoInput { width: 180px; font-size: 12px; }

        /* ポップアップ内の画像スタイル */
        .popup-img {
            max-width: 200px; max-height: 150px;
            display: block; margin-top: 5px; border: 1px solid #ddd;
        }
    </style>
</head>
<body>

    <div id="controls">
        <!-- リスト -->
        <select id="pointList"><option>読み込み中...</option></select>
        
        <!-- 写真添付エリア -->
        <div id="photoArea">
            <i class="fas fa-camera"></i>
            <input type="file" id="photoInput" accept="image/*">
        </div>

        <span style="flex:1;"></span> <!-- 右寄せ用スペーサー -->

        <button class="btn-red" onclick="clearMarkers()">クリア</button>
        <button class="btn-blue" onclick="finish()" id="btnFinish">登録</button>
    </div>

    <div id="map"></div>

    <script>
        // =========================================================
        // ★ 設定エリア
        // =========================================================
        const initialPoints = []; // テスト用: [{lat:35.68, lon:139.76, image:"base64..."}]
        const initialLat = 35.6895;
        const initialLng = 139.6917;
        const initialZoom = 12;
        // =========================================================

        var map;
        var markers = [];
        var pointList = [];
        var selectedIndex = null;
        let requestSeq = 0;

        // UI要素
        const listEl = document.getElementById("pointList");
        const photoArea = document.getElementById("photoArea");
        const photoInput = document.getElementById("photoInput");

        document.addEventListener("DOMContentLoaded", function () {
            map = L.map("map").setView([initialLat, initialLng], initialZoom);

            L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                attribution: "© OpenStreetMap contributors", maxZoom: 19
            }).addTo(map);

            L.Control.geocoder({ defaultMarkGeocode: false })
                .on("markgeocode", function(e) { map.setView(e.geocode.center, 16); })
                .addTo(map);

            // 初期データ描画
            if (Array.isArray(initialPoints)) {
                initialPoints.forEach(p => addPoint(p));
            }

            // マップクリックで追加
            map.on("click", function (e) {
                const info = {
                    lat: e.latlng.lat, lon: e.latlng.lng,
                    name: "", desc: "", extended: {}, image: null
                };
                addPoint(info);
                fetchAddressAsync(info, markers[markers.length - 1]);
            });

            // 写真選択時の処理
            photoInput.addEventListener("change", function(e) {
                if (selectedIndex === null) return;
                
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(evt) {
                    // Base64データを保存
                    pointList[selectedIndex].image = evt.target.result;
                    // ポップアップを更新して開く
                    updatePopup(markers[selectedIndex], pointList[selectedIndex]);
                    markers[selectedIndex].openPopup();
                };
                reader.readAsDataURL(file);
            });
        });

        // ポイント追加
        function addPoint(info) {
            pointList.push(info);
            const idx = pointList.length - 1;

            const icon = L.ExtraMarkers.icon({
                icon: "fa-number", number: pointList.length,
                markerColor: "blue", shape: "circle"
            });

            const m = L.marker([info.lat, info.lon], { draggable: true, icon: icon }).addTo(map);
            markers.push(m);

            // ポップアップ初期設定
            updatePopup(m, info);

            m.on("click", (ev) => {
                L.DomEvent.stopPropagation(ev);
                selectMarker(markers.indexOf(m)); 
            });
            m.on("contextmenu", () => removeMarker(markers.indexOf(m)));
            m.on("dragend", () => {
                const i = markers.indexOf(m);
                const pos = m.getLatLng();
                pointList[i].lat = pos.lat;
                pointList[i].lon = pos.lon;
                updateListUI();
                fetchAddressAsync(pointList[i], m);
            });

            selectMarker(idx); // 追加したら即選択
        }

        // ポップアップの内容生成（写真対応）
        function updatePopup(marker, point) {
            let content = `<b>${point.name || "地点 " + (markers.indexOf(marker)+1)}</b><br>`;
            content += `<span style="font-size:0.9em; color:#555;">${point.desc || "住所取得中..."}</span>`;
            
            // 写真があれば表示
            if (point.image) {
                content += `<br><img src="${point.image}" class="popup-img" />`;
            } else {
                content += `<br><span style="font-size:0.8em; color:#999;">(写真なし)</span>`;
            }

            marker.bindPopup(content);
        }

        // マーカー選択
        function selectMarker(index) {
            selectedIndex = index;
            listEl.value = index;
            renumberMarkers();

            // 写真エリアを表示＆リセット
            photoArea.style.display = "flex";
            photoInput.value = ""; // inputをリセット
            
            // 選択したマーカーのポップアップを開く
            markers[index].openPopup();
        }

        // 削除
        function removeMarker(index) {
            map.removeLayer(markers[index]);
            markers.splice(index, 1);
            pointList.splice(index, 1);
            
            selectedIndex = null;
            photoArea.style.display = "none"; // 写真エリア隠す
            updateListUI();
            renumberMarkers();
        }

        // クリア
        function clearMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            pointList = [];
            selectedIndex = null;
            photoArea.style.display = "none";
            updateListUI();
        }

        // 住所非同期取得
        function fetchAddressAsync(point, marker) {
            const seq = ++requestSeq;
            point._reqSeq = seq;

            const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${point.lat}&lon=${point.lon}&zoom=18&addressdetails=1`;

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (point._reqSeq !== seq) return;
                    if (!markers.includes(marker)) return;

                    point.name = data.name || "";
                    point.desc = data.display_name || "";
                    point.extended = data.address || {};

                    // 住所更新後、ポップアップも再描画（写真の状態を維持しつつテキスト更新）
                    updatePopup(marker, point);
                    
                    // 選択中ならリストの表記も更新
                    updateListUI();
                    
                    // もし現在選択中のマーカーなら、ポップアップを開いたまま内容更新
                    if (markers.indexOf(marker) === selectedIndex) {
                        marker.openPopup();
                    }
                })
                .catch(e => console.log("Address fetch error", e));
        }

        // マーカー番号・色更新
        function renumberMarkers() {
            markers.forEach((m, i) => {
                const isSelected = (i === selectedIndex);
                const icon = L.ExtraMarkers.icon({
                    icon: "fa-number", number: i + 1,
                    markerColor: isSelected ? "red" : "blue",
                    shape: "circle"
                });
                m.setIcon(icon);
                m.setZIndexOffset(isSelected ? 1000 : 0);
            });
        }

        // リスト表示更新
        function updateListUI() {
            listEl.innerHTML = "";
            
            if (pointList.length === 0) {
                const opt = document.createElement("option");
                opt.text = "(地点を選択してください)";
                listEl.appendChild(opt);
                return;
            }

            pointList.forEach((p, i) => {
                // 名前がない場合は住所の一部を表示
                let label = p.name || (p.desc ? p.desc.substring(0, 20) + "..." : "取得中...");
                if (p.image) label = "📷 " + label; // 写真ありマーク

                const opt = document.createElement("option");
                opt.value = i;
                opt.text = `${i+1}: ${label}`;
                listEl.appendChild(opt);
            });

            if (selectedIndex !== null) listEl.value = selectedIndex;
        }

        // リスト変更イベント
        listEl.onchange = function() {
            const val = this.value;
            if (val === "" || isNaN(val)) return;
            const idx = parseInt(val);
            
            selectMarker(idx);
            const p = pointList[idx];
            map.setView([p.lat, p.lon], map.getZoom());
        };

        // 登録ボタン (サーバ送信)
        function finish() {
            const btn = document.getElementById("btnFinish");
            
            if (btn.dataset.state === "done") {
                window.close();
                return;
            }

            btn.textContent = "送信中...";
            btn.disabled = true;

            // 写真データ(Base64)も一緒に送信されます
            fetch("/choice", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(pointList)
            })
            .then(() => fetch("/done", { method: "POST" }))
            .then(() => {
                btn.textContent = "完了 (閉じる)";
                btn.disabled = false;
                btn.dataset.state = "done";
                btn.classList.remove("btn-blue");
                btn.classList.add("btn-green");
            })
            .catch((e) => {
                console.error("送信エラー:", e);
                alert("サーバーへの送信に失敗しました。(テスト動作中は無視してください)");
                btn.textContent = "登録";
                btn.disabled = false;
            });
        }

        window.addEventListener("beforeunload", function () {
            navigator.sendBeacon("/done");
        });

    </script>
</body>
</html>
