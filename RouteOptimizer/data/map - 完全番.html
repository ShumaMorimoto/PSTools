<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Map Point Selector</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- ExtraMarkers -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/leaflet-extra-markers@1.2.2/dist/css/leaflet.extra-markers.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/leaflet-extra-markers@1.2.2/dist/js/leaflet.extra-markers.min.js"></script>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"
    />

    <!-- Leaflet Geocoder -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"
    />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
      }
      #controls {
        padding: 6px 8px;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      #pointList,
      button {
        font-size: 1rem;
        height: 1.6em;
        line-height: 1.6em;
        padding: 0 4px;
        box-sizing: border-box;
      }
      #pointList {
        flex: 1;
      }
      button {
        width: 80px;
      }
      #map {
        flex: 1;
      }
    </style>
  </head>

  <body>
    <div id="controls">
      <select id="pointList"></select>
      <button onclick="clearMarkers()">Clear</button>
      <button onclick="finish()">Finish</button>
    </div>

    <div id="map"></div>

    <script>
      // ✅ PowerShell が埋め込む
      const points = $MapData;

      var map;
      var markers = [];
      var pointList = [];
      var selectedIndex = null;

      // ------- resolveLocation（extended に統一） -------
      async function resolveLocation(lat, lon) {
        const url =
          "https://nominatim.openstreetmap.org/reverse?format=json" +
          "&lat=" +
          lat +
          "&lon=" +
          lon +
          "&zoom=18&addressdetails=1&extratags=1&namedetails=1";

        const res = await fetch(url, {
          headers: {
            "User-Agent": "MapPointSelector/1.0",
          },
        });

        const data = await res.json();

        return {
          id: null,
          lat: lat,
          lon: lon,
          name: data.name || "",
          desc: data.display_name || "",
          extended: data.address || {},   // ✅ address → extended
        };
      }

      // ------- ExtraMarkers で番号と色を更新 -------
      function renumberMarkers() {
        markers.forEach(function (m, idx) {
          var icon = L.ExtraMarkers.icon({
            icon: "fa-number",
            number: idx + 1,
            markerColor: idx === selectedIndex ? "red" : "blue",
            shape: "circle",
          });
          m.setIcon(icon);
        });
      }

      // ------- 共通：ポイント追加処理 -------
      function addPoint(info) {
        pointList.push(info);

        var icon = L.ExtraMarkers.icon({
          icon: "fa-number",
          number: pointList.length,
          markerColor: "blue",
          shape: "circle",
        });

        var m = L.marker([info.lat, info.lon], {
          draggable: true,
          icon: icon,
        }).addTo(map);

        markers.push(m);

        // 左クリックで選択
        m.on("click", function (ev) {
          L.DomEvent.stopPropagation(ev);
          var idx = markers.indexOf(m);
          if (idx >= 0) {
            selectedIndex = idx;
            document.getElementById("pointList").value = idx;
            renumberMarkers();
          }
        });

        // 右クリックで削除
        m.on("contextmenu", function () {
          var idx = markers.indexOf(m);
          if (idx >= 0) {
            map.removeLayer(markers[idx]);
            markers.splice(idx, 1);
            pointList.splice(idx, 1);

            if (selectedIndex === idx) {
              selectedIndex = null;
            } else if (selectedIndex > idx) {
              selectedIndex -= 1;
            }

            updatePointList();
            renumberMarkers();
          }
        });

        // ✅ ドラッグ後に座標＋住所情報を再取得して更新
        m.on("dragend", function () {
          var idx = markers.indexOf(m);
          if (idx >= 0) {
            var pos = m.getLatLng();

            resolveLocation(pos.lat, pos.lng).then((info) => {
              // ✅ 既存の ID を保持
              info.id = pointList[idx].id;

              // ✅ extended を含む構造に統一
              pointList[idx] = {
                id: info.id,
                lat: info.lat,
                lon: info.lon,
                name: info.name,
                desc: info.desc,
                extended: info.extended,
              };

              updatePointList();
            });
          }
        });

        updatePointList();
        renumberMarkers();
      }

      // ------- 初期化 -------
      document.addEventListener("DOMContentLoaded", function () {
        map = L.map("map").setView([$CenterLat, $CenterLng], $Zoom);

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: "© OpenStreetMap contributors",
        }).addTo(map);

        // ✅ 検索（元の機能）
        L.Control.geocoder({
          defaultMarkGeocode: false,
        })
          .on("markgeocode", function (e) {
            map.setView(e.geocode.center, map.getZoom());
          })
          .addTo(map);

        // ✅ 既存ポイントを描画（extended 前提）
        points.forEach((p) => addPoint(p));

        // ✅ クリック追加（extended に統一）
        map.on("click", async function (e) {
          const lat = e.latlng.lat;
          const lon = e.latlng.lng;

          const info = await resolveLocation(lat, lon);
          info.id = null;

          addPoint({
            id: null,
            lat: info.lat,
            lon: info.lon,
            name: info.name,
            desc: info.desc,
            extended: info.extended,
          });

          fetch("/click", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(info),
          });
        });
      });

      // ------- リスト更新 -------
      function updatePointList() {
        var list = document.getElementById("pointList");
        list.innerHTML = "";
        pointList.forEach(function (p, idx) {
          var opt = document.createElement("option");
          opt.value = idx;

          opt.textContent =
            idx +
            1 +
            ": " +
            (p.name || p.desc || p.lat.toFixed(6) + ", " + p.lon.toFixed(6));

          list.appendChild(opt);
        });

        if (selectedIndex !== null && selectedIndex < pointList.length) {
          list.value = selectedIndex;
        }
      }

      // ------- リスト選択でジャンプ -------
      document.getElementById("pointList").onchange = function () {
        var idx = this.value;
        if (idx === "" || idx == null) return;
        idx = Number(idx);
        selectedIndex = idx;

        var p = pointList[idx];
        map.setView([p.lat, p.lon], map.getZoom());

        renumberMarkers();
      };

      // ------- Clear -------
      function clearMarkers() {
        markers.forEach((m) => map.removeLayer(m));
        markers = [];
        pointList = [];
        selectedIndex = null;
        updatePointList();
        renumberMarkers();
      }

      // ------- Finish（編集結果を返す） -------
      function finish() {
        fetch("/choice", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(pointList),
        });

        fetch("/done", { method: "POST" }).then(function () {
          alert("Finish requested. You can close this window.");
        });
      }

      // ------- 終了時 -------
      window.addEventListener("beforeunload", function () {
        navigator.sendBeacon("/done");
      });
    </script>
  </body>
</html>
