<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>Leaflet 自治体境界表示</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>#map { height: 100vh; }</style>
</head>
<body>
    <div id="map"></div>
    <script>
        const map = L.map('map').setView([35.6895, 139.6917], 13); // 初期中心（東京）
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let boundaryLayer; // 既存境界をクリアするための変数

        function showBoundary() {
            if (boundaryLayer) map.removeLayer(boundaryLayer); // 前の境界を削除

            const center = map.getCenter();
            const lat = center.lat;
            const lon = center.lng;

            // Overpass QLクエリ: 中心点を含む行政境界（市区町村レベル優先）
            const query = `
                [out:json];
                is_in(${lat},${lon})->.a;
                rel(pivot.a)[boundary=administrative][admin_level=7];
                out geom;
            `;

            fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`)
                .then(response => response.json())
                .then(data => {
                    if (data.elements.length > 0) {
                        const geojson = osmtogeojson(data); // osmtogeojsonライブラリが必要
                        boundaryLayer = L.geoJSON(geojson, {
                            style: { color: 'red', weight: 4, fillOpacity: 0.1 }
                        }).addTo(map);
                        map.fitBounds(boundaryLayer.getBounds()); // 境界にズーム
                    }
                });
        }

        // 地図移動時に境界更新（例: moveendイベント）
        map.on('moveend', showBoundary);

        // 初回実行
        showBoundary();

        // osmtogeojsonライブラリ読み込み（CDN）
        const script = document.createElement('script');
        script.src = 'https://unpkg.com/osmtogeojson@3.0.0-beta.5/osmtogeojson.js';
        document.head.appendChild(script);
    </script>
</body>
</html>
