<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Selector + 画像重ね合わせツール（修正版）</title>

<!-- Leaflet 本体（必ず最初） -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- leaflet-toolbar（distortableimage の依存） -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-toolbar@0.4.0-alpha.2/dist/leaflet.toolbar.css" />
<script src="https://unpkg.com/leaflet-toolbar@0.4.0-alpha.2/dist/leaflet.toolbar.js"></script>

<!-- leaflet-distortableimage（toolbar の後に読み込む） -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-distortableimage@latest/dist/leaflet.distortableimage.css" />
<script src="https://unpkg.com/leaflet-distortableimage@latest/dist/leaflet.distortableimage.js"></script>

<!-- ExtraMarkers (マーカー装飾) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-extra-markers@1.2.2/dist/css/leaflet.extra-markers.min.css" />
<script src="https://cdn.jsdelivr.net/npm/leaflet-extra-markers@1.2.2/dist/js/leaflet-extra-markers.min.js"></script>

<!-- Geocoder -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<!-- FontAwesome (アイコン) -->
<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />

<style>
    html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        font-family: sans-serif;
    }

    /* 上部操作パネル */
    #controls {
        padding: 8px;
        background: #f0f0f0;
        border-bottom: 1px solid #ccc;
        display: flex;
        gap: 10px;
        height: 56px;
        box-sizing: border-box;
        align-items: center;
        z-index: 1000;
    }

    /* マップエリア */
    #map {
        flex: 1;
        width: 100%;
        background-color: #ddd;
        cursor: crosshair;
    }

    /* UIパーツ */
    #pointList { flex: 1; padding: 5px; height: 34px; }
    button, label.btn {
        padding: 6px 12px;
        cursor: pointer;
        border: none;
        background: #007bff;
        color: #fff;
        border-radius: 4px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
    }
    button:hover, label.btn:hover { background: #0056b3; }
    button.locked { background: #dc3545; }
    button.locked:hover { background: #c82333; }

    input[type="file"] { display: none; }

    #info-box {
        font-family: monospace;
        font-size: 13px;
        background: white;
        padding: 6px 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }

    /* ロックモード時の画像透過（地図クリックを優先） */
    .map-locked .leaflet-distortable-image-overlay,
    .map-locked img.leaflet-image-layer {
        pointer-events: none !important;
        cursor: crosshair !important;
        opacity: 0.85 !important;
        z-index: 200 !important;
    }
</style>
</head>
<body>

<div id="controls">
    <!-- 画像追加 -->
    <label for="imageInput" class="btn"><i class="fas fa-upload"></i> 画像を追加</label>
    <input type="file" id="imageInput" accept="image/*">

    <!-- 位置調整 / 確定切替 -->
    <button id="toggleLockBtn" class="btn" onclick="toggleLockMode()">
        <i class="fas fa-lock-open"></i> <span>位置調整モード</span>
    </button>

    <!-- ポイントリスト / 操作 -->
    <select id="pointList"><option>読み込み中...</option></select>
    <button onclick="clearMarkers()">クリア</button>
    <button onclick="finish()" id="finishBtn">登録</button>

    <div id="info-box">座標: <span id="coords">マップをクリックしてください</span></div>
</div>

<div id="map"></div>

<script>
/* =========================================================
   最小差分修正版スクリプト（既存ロジックを維持）
   ========================================================= */

const initialPoints = [
    { lat: 35.6812, lon: 139.7671, name: "東京駅(テスト)", desc: "初期データ" }
];
const initialLat = 35.6895;
const initialLng = 139.6917;
const initialZoom = 12;

let map;
let markers = [];
let pointList = [];
let selectedIndex = null;
let requestSeq = 0;

let imgGroup;      // L.featureGroup()
let isLocked = false;

document.addEventListener("DOMContentLoaded", function () {
    map = L.map("map").setView([initialLat, initialLng], initialZoom);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap contributors",
    }).addTo(map);

    imgGroup = L.featureGroup().addTo(map);

    L.Control.geocoder({
        defaultMarkGeocode: false,
    })
    .on("markgeocode", function (e) {
        map.setView(e.geocode.center, map.getZoom());
    })
    .addTo(map);

    initialPoints.forEach((p) => addPoint(p));

    map.on("click", function (e) {
        const lat = e.latlng.lat;
        const lon = e.latlng.lng;

        const info = {
            lat: lat,
            lon: lon,
            name: "",
            desc: "",
        };

        addPoint(info);

        document.getElementById("coords").textContent = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
    });
});

function addPoint(info) {
    pointList.push(info);

    var icon = L.ExtraMarkers.icon({
        icon: "fa-number",
        number: pointList.length,
        markerColor: "blue",
        shape: "circle",
    });

    var m = L.marker([info.lat, info.lon], {
        draggable: true,
        icon: icon,
    }).addTo(map);

    markers.push(m);

    m.on("click", function (ev) {
        L.DomEvent.stopPropagation(ev);
        var idx = markers.indexOf(m);
        if (idx >= 0) {
            selectedIndex = idx;
            document.getElementById("pointList").value = idx;
            renumberMarkers();
        }
    });

    m.on("contextmenu", function () {
        var idx = markers.indexOf(m);
        if (idx >= 0) {
            map.removeLayer(markers[idx]);
            markers.splice(idx, 1);
            pointList.splice(idx, 1);

            if (selectedIndex === idx) {
                selectedIndex = null;
            } else if (selectedIndex > idx) {
                selectedIndex -= 1;
            }

            updatePointList();
            renumberMarkers();
        }
    });

    m.on("dragend", function () {
        var idx = markers.indexOf(m);
        if (idx >= 0) {
            var pos = m.getLatLng();
            pointList[idx].lat = pos.lat;
            pointList[idx].lon = pos.lng;
        }
    });

    updatePointList();
    renumberMarkers();
}

function renumberMarkers() {
    markers.forEach(function (m, idx) {
        var icon = L.ExtraMarkers.icon({
            icon: "fa-number",
            number: idx + 1,
            markerColor: idx === selectedIndex ? "red" : "blue",
            shape: "circle",
        });
        m.setIcon(icon);
    });
}

function updatePointList() {
    var list = document.getElementById("pointList");
    list.innerHTML = "";

    pointList.forEach(function (p, idx) {
        const latlon = `(${p.lat}, ${p.lon})`;
        var opt = document.createElement("option");
        opt.value = idx;
        opt.textContent = `${idx + 1}: ${latlon}`;
        list.appendChild(opt);
    });

    if (selectedIndex !== null && selectedIndex < pointList.length) {
        list.value = selectedIndex;
    }
}

function clearMarkers() {
    markers.forEach((m) => map.removeLayer(m));
    markers = [];
    pointList = [];
    selectedIndex = null;

    updatePointList();
    renumberMarkers();
}

function toggleLockMode() {
    isLocked = !isLocked;

    if (isLocked) {
        imgGroup.eachLayer(function(layer) {
            try { layer.editing.disable(); } catch(e){}
        });
        document.getElementById("map").classList.add("map-locked");
        document.getElementById("toggleLockBtn").classList.add("locked");
        document.querySelector("#toggleLockBtn span").textContent = "確定モード";
    } else {
        imgGroup.eachLayer(function(layer) {
            try { layer.editing.enable(); } catch(e){}
        });
        document.getElementById("map").classList.remove("map-locked");
        document.getElementById("toggleLockBtn").classList.remove("locked");
        document.querySelector("#toggleLockBtn span").textContent = "位置調整モード";
    }
}

function finish() {
    const btn = document.getElementById("finishBtn");

    if (btn.dataset.state === "done") {
        window.close();
        return;
    }

    btn.disabled = true;
    btn.textContent = "処理中…";

    fetch("/choice", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(pointList),
    })
    .then(() => fetch("/done", { method: "POST" }))
    .then(() => {
        btn.textContent = "完了";
        btn.disabled = false;
        btn.dataset.state = "done";
    })
    .catch(() => {
        btn.disabled = false;
        btn.textContent = "登録";
        delete btn.dataset.state;
    });
}

window.addEventListener("beforeunload", function () {
    navigator.sendBeacon("/done");
});
</script>

</body>
</html>
