<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaflet 拠点一覧サンプル</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- FontAwesome (アイコン用) -->
    <link href="https://use.fontawesome.com/releases/v5.0.6/css/all.css" rel="stylesheet">
    <!-- Leaflet Sidebar v2 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-sidebar-v2@3.2.3/css/leaflet-sidebar.min.css" />

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: "Helvetica Neue", Arial, Helvetica, sans-serif;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* --- 方法1：ドロップダウンリストのスタイル --- */
        .custom-dropdown-container {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000; /* 地図より上に表示 */
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
        }
        select {
            font-size: 16px;
            padding: 5px;
            min-width: 200px;
        }

        /* --- 方法2：サイドバー内のリストスタイル --- */
        .location-list-item {
            display: block;
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.2s;
        }
        .location-list-item:hover {
            background-color: #f0f0f0;
        }
        .location-list-item strong {
            display: block;
            color: #333;
        }
        .location-list-item small {
            color: #666;
        }
    </style>
</head>
<body>

    <!-- --- 方法2：サイドバーのHTML構造 (leaflet-sidebar-v2) --- -->
    <div id="sidebar" class="leaflet-sidebar collapsed">
        <!-- タブ（アイコン部分） -->
        <div class="leaflet-sidebar-tabs">
            <ul role="tablist">
                <!-- ハンバーガーメニューアイコン -->
                <li><a href="#home" role="tab"><i class="fa fa-bars"></i></a></li>
            </ul>
        </div>

        <!-- パネル（中身部分） -->
        <div class="leaflet-sidebar-content">
            <div class="leaflet-sidebar-pane" id="home">
                <h1 class="leaflet-sidebar-header">
                    拠点一覧リスト
                    <span class="leaflet-sidebar-close"><i class="fa fa-caret-left"></i></span>
                </h1>
                <!-- ここにJSでリストを追加します -->
                <div id="sidebar-list-container"></div>
            </div>
        </div>
    </div>

    <!-- 地図コンテナ -->
    <div id="map"></div>

    <!-- --- 方法1：ドロップダウンリストのHTML構造 --- -->
    <div class="custom-dropdown-container">
        <label for="location-select" style="font-weight:bold; display:block; margin-bottom:5px;">クイック移動 (方法1)</label>
        <select id="location-select">
            <option value="">拠点を選択してください</option>
            <!-- ここにJSでoptionを追加します -->
        </select>
    </div>

    <!-- JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-sidebar-v2@3.2.3/js/leaflet-sidebar.min.js"></script>

    <script>
        // --- 0. 拠点データの定義 ---
        var locations = [
            { name: "東京駅", lat: 35.681236, lng: 139.767125, desc: "日本の鉄道の中心地" },
            { name: "東京タワー", lat: 35.658581, lng: 139.745433, desc: "赤いランドマーク" },
            { name: "スカイツリー", lat: 35.710063, lng: 139.8107, desc: "世界一高いタワー" },
            { name: "新宿駅", lat: 35.689634, lng: 139.700567, desc: "乗降客数世界一" },
            { name: "渋谷スクランブル", lat: 35.659482, lng: 139.700553, desc: "若者の街" }
        ];

        // --- 1. 地図の初期化 ---
        var map = L.map('map').setView([35.681236, 139.767125], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // --- 2. 方法2用のサイドバー初期化 ---
        var sidebar = L.control.sidebar({
            container: 'sidebar',
            position: 'left'
        }).addTo(map);

        // --- 3. データループ処理 ---
        var select = document.getElementById('location-select'); // 方法1用
        var sidebarList = document.getElementById('sidebar-list-container'); // 方法2用

        locations.forEach(function(loc) {
            // A. 地図にマーカーを追加
            L.marker([loc.lat, loc.lng])
                .addTo(map)
                .bindPopup("<b>" + loc.name + "</b><br>" + loc.desc);

            // B. 【方法1】ドロップダウンに選択肢を追加
            var option = document.createElement('option');
            // 値として座標をJSON文字列で持たせる
            option.value = JSON.stringify({lat: loc.lat, lng: loc.lng}); 
            option.text = loc.name;
            select.appendChild(option);

            // C. 【方法2】サイドバーにリスト項目を追加
            var listItem = document.createElement('div');
            listItem.className = 'location-list-item';
            listItem.innerHTML = `<strong>${loc.name}</strong><small>${loc.desc}</small>`;
            
            // リストクリック時の動作
            listItem.addEventListener('click', function() {
                // ズーム移動
                flyToLocation(loc.lat, loc.lng);
                
                // スマホなど画面が狭い場合は、クリック後にサイドバーを閉じる
                if (window.innerWidth < 768) {
                    sidebar.close();
                }
            });
            sidebarList.appendChild(listItem);
        });

        // --- 4. 【方法1】ドロップダウン変更時のイベント ---
        select.addEventListener('change', function(e) {
            if (e.target.value) {
                var coords = JSON.parse(e.target.value);
                flyToLocation(coords.lat, coords.lng);
            }
        });

        // 共通の移動関数
        function flyToLocation(lat, lng) {
            map.flyTo([lat, lng], 16, {
                animate: true,
                duration: 1.5 // 移動にかかる秒数
            });
        }

    </script>
</body>
</html>
