<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaflet GeoSearch Customization</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- GeoSearch CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-geosearch@3.11.0/dist/geosearch.css" />

    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100%; }

        /* =========================================
           leaflet-geosearch カスタマイズCSS
           ========================================= */

        /* 1. 検索ボタン（虫眼鏡アイコン）のサイズ変更 */
        .leaflet-geosearch-button a.leaflet-bar-part {
            width: 50px !important;       /* 幅 */
            height: 50px !important;      /* 高さ */
            line-height: 50px !important; /* アイコンの垂直位置合わせ */
            font-size: 40px !important;   /* アイコン自体の大きさ */
            border-radius: 4px !important;
        }

        /* 2. 検索フォーム（白いコンテナ全体）のサイズと調整 */
        .leaflet-geosearch-button form {
            /* 検索ボタンと同じ高さにするか、少し調整する */
            top: 0 !important;
            padding: 0 10px !important; /* 内側の余白 */
            height: 50px !important;    /* フォーム全体の高さ */
            background-color: white;
            box-shadow: 0 1px 5px rgba(0,0,0,0.65);
            display: none; /* 初期状態は非表示（ライブラリ制御） */
            align-items: center; /* 中身を垂直中央揃え */
        }
        
        /* フォームが開いている時の状態 */
        .leaflet-geosearch-button.active form {
            display: flex !important; /* Flexboxで並べる */
            width: 350px !important;  /* ★ここで入力ボックス全体の幅を指定 */
        }

        /* 3. 入力ボックス（文字を入れるところ）のサイズ */
        .leaflet-geosearch-button form input {
            height: 40px !important;  /* 高さ */
            font-size: 16px !important; /* 文字サイズ */
            border: 1px solid #ccc !important;
            border-radius: 4px !important;
            padding-left: 10px !important;
            margin-right: 5px !important;
            width: 100% !important; /* 残りの幅を埋める */
        }

        /* 4. Xボタン（リセットボタン）のサイズ */
        .leaflet-geosearch-button form a.reset {
            font-size: 24px !important;   /* ×印の大きさ */
            line-height: 40px !important; /* 高さ合わせ */
            height: 40px !important;
            width: 40px !important;       /* クリックエリアの幅 */
            color: #d9534f !important;    /* 赤っぽくする例 */
            background: #eee !important;  /* 背景色をつける例 */
            text-align: center;
            border-radius: 4px;
            text-decoration: none;
            cursor: pointer;
            padding: 0 !important;
            display: inline-block;
        }

        /* 5. 検索結果リストのデザイン調整 */
        .leaflet-geosearch-button .results {
            top: 55px !important; /* フォームの高さに合わせて少し下げる */
        }
        .leaflet-geosearch-button .results > * {
            font-size: 14px;
            padding: 8px;
            border-bottom: 1px solid #eee;
            background: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-geosearch@3.11.0/dist/bundle.min.js"></script>

    <script>
        // 地図の初期化
        var map = L.map('map').setView([35.681236, 139.767125], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // GeoSearchの設定
        const provider = new window.GeoSearch.OpenStreetMapProvider();

        const searchControl = new window.GeoSearch.GeoSearchControl({
            provider: provider,
            style: 'button', // ボタン形式を指定
            autoClose: true,
            keepResult: true,
            showMarker: true,
            searchLabel: '住所を入力してください...', // プレースホルダー
        });

        map.addControl(searchControl);

    </script>
</body>
</html>
